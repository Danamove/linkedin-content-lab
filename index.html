one's job + \"While working it is no longer your personal life\" IN RELATION TO WHAT YOU'RE EATING is truly off the charts", "hook": "Let's look at this (objectively unhinged) email that MrBeast employees got the other day, **from an internal comms lens.** AS AN INTERNAL CO…", "ratio": 1.15, "band": "baseline", "name": "Liz Ryan"}, {"id": "7470587109809041409", "url": "https://www.linkedin.com/posts/lizryan_you-hired-those-employees-you-have-so-little-activity-7470587109809041409-rjkG", "kind": "post", "date": "2026-06-10T21:26:03.775000+00:00", "reactions": 89, "comments": 66, "engagement": 155, "text": "\"Remote workers are grabbing groceries or at the vet 30% of the time.\" Real quote. Real CEO. This week. His proof: a packed office at 5pm on a Friday. Friday. 5pm. The hour everyone stays late because leadership hasn't left yet. I've managed a $4.8M portfolio from 24 countries. Never met most of my team in person. 130% NRR. Groceries? Never. Surf? Yes. Results? Always. He had a full week of data. He went with bodies in chairs. Attendance theatre. The CEOs still counting heads at 5pm are telling on themselves. What's the most out-of-touch thing a leader has said about remote work?", "hook": "\"Remote workers are grabbing groceries or at the vet 30% of the time.\" Real quote.", "ratio": 1.01, "band": "baseline", "name": "Liz Ryan"}, {"id": "7470560797329485824", "url": "https://www.linkedin.com/posts/lizryan_the-us-is-not-a-leader-when-it-comes-to-workforce-activity-7470560797329485824-0j8c", "kind": "post", "date": "2026-06-10T19:41:30.391000+00:00", "reactions": 273, "comments": 6, "engagement": 279, "text": "The US is not a leader when it comes to workforce policies – in fact, we have the worst employment laws of any industrialized country. Congratulations to working people in Mexico on these tremendous labor reforms!", "hook": "The US is not a leader when it comes to workforce policies – in fact, we have the worst employment laws of any industrialized country.", "ratio": 1.82, "band": "baseline", "name": "Liz Ryan"}, {"id": "7470524950748119040", "url": "https://www.linkedin.com/posts/lizryan_makes-perfect-sense-to-me-activity-7470524950748119040-So37", "kind": "post", "date": "2026-06-10T17:19:03.900000+00:00", "reactions": 11, "comments": 0, "engagement": 11, "text": "", "hook": "", "ratio": 0.07, "band": "baseline", "name": "Liz Ryan"}, {"id": "7470470871401250816", "url": "https://www.linkedin.com/posts/lizryan_50-essential-ceos-globally-to-follow-on-linkedin-activity-7470470871401250816-1scF", "kind": "post", "date": "2026-06-10T13:44:10.379000+00:00", "reactions": 9, "comments": 3, "engagement": 12, "text": "Most LinkedIn CEO follow lists recycle the same 10 names. I wanted to build something different. I compiled a directory of 50 CEOs globally who are actually posting original content on LinkedIn in 2026, writing from real conviction, and changing how people in their industries think. Not just the mega-followed tech giants. The full picture. Satya Nadella on AI and empathy. Strive Masiyiwa on building African infrastructure across four decades. Hamdi Ulukaya on refugees, food, and what it actually means to put people first. Whitney Wolfe Herd on what female founders face that no one else does. Fei-Fei Li on where AI is actually going. And 45 more. The list spans tech, sustainability, purpose, scaling, and global voices from Africa, Asia, Europe, the Middle East, and Latin America. I applied one filter above all others: does this person post content that would genuinely change how you think about leadership and business? Every person on this list passed. Instead of recycling the same handful of names that appear on every list, I wanted to surface the leaders who genuinely deserve to be just as well known. Here are some of the leaders who made the list: Jensen Huang, Sundar Pichai, Tobias Lütke, Shishir Mehrotra, Anupam Mittal, Arianna Huffington, Indra Nooyi, Fidji Simo, Sallie Krawcheck, Sara Blakely, Julie Chapon, Marina Byezhanova, Hamdi Ulukaya, Strive Masiyiwa, Paul Polman, Marc Benioff, Alexandr Wang, Leena Nair, Melanie Perkins, Patrick Collison, Ryan Breslow, Mo Ibrahim, Falguni Nayar, Bolaji Akinboro, Isabelle Kocher de Leyritz, Nicola Mendelsohn CBE, Brian Chesky, Dara Khosrowshahi, Hubert Joly, Hamza Mudassir, Liz Ryan, Raj Sisodia, Lynda Gratton, Reed Hastings, Demis Hassabis, Brian Armstrong, Fei-Fei Li, Henry Timms, Jeff Weiner, Aigerim Shorman Full directory at https://lnkd.in/g9WY7GFd If your leadership team needs more than a better reading list, I facilitate Working Genius workshops, executive team offsites, and keynotes for organisations globally. Email me at jonno@consultclarity.org.", "hook": "Most LinkedIn CEO follow lists recycle the same 10 names.", "ratio": 0.08, "band": "baseline", "name": "Liz Ryan"}, {"id": "7470176660747694082", "url": "https://www.linkedin.com/posts/lizryan_patriarchy-is-not-the-only-way-activity-7470176660747694082-gVTL", "kind": "post", "date": "2026-06-09T18:15:05.093000+00:00", "reactions": 24, "comments": 2, "engagement": 26, "text": "Patriarchy is not the only way | Liz Ryan", "hook": "Patriarchy is not the only way | Liz Ryan", "ratio": 0.17, "band": "baseline", "name": "Liz Ryan"}, {"id": "7470127629766139904", "url": "https://www.linkedin.com/posts/lizryan_the-left-has-a-marriage-problem-women-may-activity-7470127629766139904--TKq", "kind": "post", "date": "2026-06-09T15:00:15.196000+00:00", "reactions": 38, "comments": 8, "engagement": 46, "text": "It shouldn’t take “courage” to get married and have children. Marriage and motherhood shouldn’t be as expensive, risky and unsupported as they are. Women are not the problem.", "hook": "It shouldn’t take “courage” to get married and have children.", "ratio": 0.3, "band": "baseline", "name": "Liz Ryan"}, {"id": "pulse:grandmas-hr-story-time-liz-ryan-9ovte", "url": "https://www.linkedin.com/pulse/grandmas-hr-story-time-liz-ryan-9ovte", "kind": "article", "date": "2026-06-09T00:00:00+00:00", "reactions": 150, "comments": 32, "engagement": 182, "text": "Why, Granny and a lot of Granny's friends went to conferences all about work from home and flex time and setting up councils and networks for women and diverse communities and making sure everybody knew they were valued.", "hook": "Why, Granny and a lot of Granny's friends went to conferences all about work from home and flex time and setting up councils and networks fo…", "ratio": 1.19, "band": "baseline", "name": "Liz Ryan"}, {"id": "pulse:when-you-get-mad-enough-youll-do-liz-ryan-lqjke", "url": "https://www.linkedin.com/pulse/when-you-get-mad-enough-youll-do-liz-ryan-lqjke", "kind": "article", "date": "2026-05-21T00:00:00+00:00", "reactions": 101, "comments": 24, "engagement": 125, "text": "> Hi Liz, thank you so much for getting me out of my rut! I submitted 114 applications before I found your course. A month later my job search took off. I just accepted an offer. I'm bummed that I wasted five months but ecstatic to be back in action! - Daniela, St. Louis", "hook": "> Hi Liz, thank you so much for getting me out of my rut!", "ratio": 0.81, "band": "baseline", "name": "Liz Ryan"}, {"id": "pulse:i-other-side-desk-heres-what-saw-liz-ryan-5swme", "url": "https://www.linkedin.com/pulse/i-other-side-desk-heres-what-saw-liz-ryan-5swme", "kind": "article", "date": "2026-05-14T00:00:00+00:00", "reactions": 126, "comments": 26, "engagement": 152, "text": "*   Six hours of video instruction walking you through the complete Human-Voiced Job Search™ methodology -- from getting clear on the job you want, to building a resume and LinkedIn profile that tell your real story, to reaching the right hiring managers through channels that actually work, to interviewing like a peer rather than a supplicant.", "hook": "*   Six hours of video instruction walking you through the complete Human-Voiced Job Search™ methodology -- from getting clear on the job yo…", "ratio": 0.99, "band": "baseline", "name": "Liz Ryan"}, {"id": "pulse:its-time-go-get-job-you-deserve-liz-ryan-ntxbe", "url": "https://www.linkedin.com/pulse/its-time-go-get-job-you-deserve-liz-ryan-ntxbe", "kind": "article", "date": "2026-05-07T00:00:00+00:00", "reactions": 110, "comments": 10, "engagement": 120, "text": "And if you know someone who needs to hear this today -- a friend who has been stuck, a colleague who deserves better, a family member who has been waiting too long -- share this with them. Tag them in the comments. Sometimes all it takes is someone saying: it's time.", "hook": "And if you know someone who needs to hear this today -- a friend who has been stuck, a colleague who deserves better, a family member who ha…", "ratio": 0.78, "band": "baseline", "name": "Liz Ryan"}, {"id": "pulse:does-your-job-still-deserve-you-liz-ryan-nv0ke", "url": "https://www.linkedin.com/pulse/does-your-job-still-deserve-you-liz-ryan-nv0ke", "kind": "article", "date": "2026-04-30T00:00:00+00:00", "reactions": 182, "comments": 28, "engagement": 210, "text": "Almost everyone is job searching the same way -- applying to posted jobs through recruiting websites that were never designed to help candidates, sending resumes written in language so identical and lifeless that hiring managers can barely tell one apart from another and waiting to be found instead of going out and finding the right people.", "hook": "Almost everyone is job searching the same way -- applying to posted jobs through recruiting websites that were never designed to help candid…", "ratio": 1.37, "band": "baseline", "name": "Liz Ryan"}, {"id": "pulse:asked-why-should-hire-me-i-told-truth-liz-ryan-pdywe", "url": "https://www.linkedin.com/pulse/asked-why-should-hire-me-i-told-truth-liz-ryan-pdywe", "kind": "article", "date": "2026-04-23T00:00:00+00:00", "reactions": 278, "comments": 36, "engagement": 314, "text": "Then the VP said, \"You know, I was hired as HR Director here a year ago. I just got promoted to VP when our previous VP retired. To hit our goals for next year, our recruiting needs to be as strong as our product development or our sales organization -- which it has not been. We need the outlook you're talking about. Let me change my question: If I commit to do the things you outlined, will you take this job?\"", "hook": "Then the VP said, \"You know, I was hired as HR Director here a year ago.", "ratio": 2.05, "band": "working", "name": "Liz Ryan"}, {"id": "pulse:she-finally-thriving-work-happened-liz-ryan-u00ic", "url": "https://www.linkedin.com/pulse/she-finally-thriving-work-happened-liz-ryan-u00ic", "kind": "article", "date": "2026-04-16T00:00:00+00:00", "reactions": 118, "comments": 20, "engagement": 138, "text": "The traditional advice for getting a job doesn’t work, either – from old-school robotic branding like, “Motivated self-starter with a proven track record” to the misguided belief that a job search is just a numbers game - so that if you apply for 40 jobs and don’t hear anything back, the best thing to do is use the same resume to apply for another 100 jobs.", "hook": "The traditional advice for getting a job doesn’t work, either – from old-school robotic branding like, “Motivated self-starter with a proven…", "ratio": 0.9, "band": "baseline", "name": "Liz Ryan"}, {"id": "pulse:you-dont-have-run-your-career-alone-liz-ryan-6fyae", "url": "https://www.linkedin.com/pulse/you-dont-have-run-your-career-alone-liz-ryan-6fyae", "kind": "article", "date": "2026-04-09T00:00:00+00:00", "reactions": 128, "comments": 13, "engagement": 141, "text": "I started writing and speaking about these ideas, and now there are three million of us in the Human Workplace movement to reinvent work for people. For about 25 years I've been teaching how to get a job that deserves your talents, how to brand yourself for the roles you actually want, and how to use Pain Letters™ and your Human-Voiced Resume™ full of Dragon-Slaying Stories™ to stand out — and to remind yourself of the triumphant journey you've already taken.", "hook": "I started writing and speaking about these ideas, and now there are three million of us in the Human Workplace movement to reinvent work for…", "ratio": 0.92, "band": "baseline", "name": "Liz Ryan"}, {"id": "pulse:10-job-search-moves-hurt-you-liz-ryan-kefee", "url": "https://www.linkedin.com/pulse/10-job-search-moves-hurt-you-liz-ryan-kefee", "kind": "article", "date": "2026-04-02T00:00:00+00:00", "reactions": 164, "comments": 16, "engagement": 180, "text": "4. You can’t lead with what you’ve done. That’s table stakes. At this level, you’re hired for your point of view. You're hired into an exec role because your thinking and their thinking about the industry, function and landscape align.", "hook": "4.", "ratio": 1.17, "band": "baseline", "name": "Liz Ryan"}, {"id": "pulse:career-freefall-you-never-saw-coming-liz-ryan-vhfre", "url": "https://www.linkedin.com/pulse/career-freefall-you-never-saw-coming-liz-ryan-vhfre", "kind": "article", "date": "2026-03-26T00:00:00+00:00", "reactions": 175, "comments": 27, "engagement": 202, "text": "That voice is a lie. But it’s a convincing one when you’re navigating a process that wasn’t built for someone at your level — that asks you to shrink yourself into an application, that offers nothing back but silence, that measures your 30 years of impact against a keyword list someone in HR built on a Tuesday afternoon.", "hook": "That voice is a lie.", "ratio": 1.32, "band": "baseline", "name": "Liz Ryan"}, {"id": "7470795727959605248", "url": "https://www.linkedin.com/posts/louisetriance_customersatisfaction-clientexperience-activity-7470795727959605248-MkO5", "kind": "post", "date": "2026-06-11T11:15:02.218000+00:00", "reactions": 3, "comments": 0, "engagement": 3, "text": "𝐆𝐮𝐞𝐬𝐭 𝐁𝐥𝐨𝐠: 𝐇𝐨𝐰 𝐭𝐨 𝐌𝐞𝐚𝐬𝐮𝐫𝐞 𝐂𝐮𝐬𝐭𝐨𝐦𝐞𝐫 𝐒𝐚𝐭𝐢𝐬𝐟𝐚𝐜𝐭𝐢𝐨𝐧 𝐢𝐧 𝐑𝐞𝐜𝐫𝐮𝐢𝐭𝐦𝐞𝐧𝐭 - 𝐟𝐫𝐨𝐦 3R In recruitment, customer satisfaction isn’t just a “nice to have”, it directly impacts retention, repeat business and referrals. For agencies looking to scale, maintaining strong client relationships is critical. In this latest guest blog, 3R explores: 🔸 How recruitment agencies measure customer satisfaction 🔸 Why client happiness drives growth 🔸The key KPIs and metrics to track 🔸When to collect feedback, and what to do with it 🔸 Digital tools that can support the process Agencies that measure and act on client satisfaction are far better positioned for sustainable growth. 📖 Read the full article 👇 https://lnkd.in/eMGzJZw8 #CustomerSatisfaction #ClientExperience #RecruitmentGrowth #AgencyGrowth #RecruitmentLeadership #UKRecruiter", "hook": "𝐆𝐮𝐞𝐬𝐭 𝐁𝐥𝐨𝐠: 𝐇𝐨𝐰 𝐭𝐨 𝐌𝐞𝐚𝐬𝐮𝐫𝐞 𝐂𝐮𝐬𝐭𝐨𝐦𝐞𝐫 𝐒𝐚𝐭𝐢𝐬𝐟𝐚𝐜𝐭𝐢𝐨𝐧 𝐢𝐧 𝐑𝐞𝐜𝐫𝐮𝐢𝐭𝐦𝐞𝐧𝐭 - 𝐟𝐫𝐨𝐦 3R In recruitment, customer satisfaction isn’t just a “nice to have”,…", "ratio": null, "band": "n/a", "name": "Louise Triance"}, {"id": "7466282160576999424", "url": "https://www.linkedin.com/posts/michaelbrown91281_counsel-health-is-the-hottest-health-tech-activity-7466282160576999424-p6pf", "kind": "post", "date": "2026-05-30T00:19:43.896000+00:00", "reactions": 115, "comments": 7, "engagement": 122, "text": "Counsel Health is THE hottest health tech company in NYC and Boston. Remote friendly! I get the privilege of partnering with Angel Maredia as we scale the product management team at Counsel. We’re hiring two Sr Product Managers! Sr Product Manager, Consumer - https://lnkd.in/eqWqt2DM You own the experience patients have with their AI-enabled doctor. Every onboarding flow, every care interaction, every clinical touchpoint is yours to shape. Sr Product Manager, Enterprise - https://lnkd.in/e_xzs3uz You decide how Counsel shows up inside the world’s leading healthcare organizations. Equal parts platform architect and patient advocate. I’m pumped! DMs are open. Let’s build.", "hook": "Counsel Health is THE hottest health tech company in NYC and Boston.", "ratio": 1.2, "band": "baseline", "name": "Michael Brown"}, {"id": "7465760447640584192", "url": "https://www.linkedin.com/posts/michaelbrown91281_big-news-coming-out-of-counsel-health-activity-7465760447640584192-MjWP", "kind": "post", "date": "2026-05-28T13:46:37.839000+00:00", "reactions": 76, "comments": 6, "engagement": 82, "text": "Big news coming out of Counsel Health! Starting June 16, ŌURA members can go from a real biometric signal to physician-led care in minutes, inside the same app they already use. No switching. No leaving your house to wait at urgent care. No starting from scratch with a doctor who doesn't know your history. The wearable space has gotten incredibly good at surfacing data. What's always been missing is a fast, trustworthy path to actually do something with it. That's exactly what we're building at Counsel and this partnership is a big step in that direction. Proud of the team. Fired up for what's next with Counsel! Were also hiring! ❤️ Check out our open jobs here - https://lnkd.in/eiGxyP4B Read the full announcement ➡️ https://lnkd.in/eTRD36WD More to come!", "hook": "Big news coming out of Counsel Health!", "ratio": 0.8, "band": "baseline", "name": "Michael Brown"}, {"id": "7465135728599986179", "url": "https://www.linkedin.com/posts/michaelbrown91281_were-growing-fast-at-counsel-health-and-activity-7465135728599986179-ge9s", "kind": "post", "date": "2026-05-26T20:24:13.213000+00:00", "reactions": 81, "comments": 0, "engagement": 81, "text": "We're growing fast at Counsel Health, and the clinical side of the business is leading it. Our physicians practice medicine the way most have always wanted to: seeing patients, using judgment, and doing the part only they can do. The difference is how. Visits are messaging-based, AI-paired, and built around what's actually best for the patient instead of what the EMR will let you click. We're hiring across the clinical org right now: - Physicians, Virtual Care: full time, part time, and evenings/weekends. If you want to practice in a care model built from scratch around the clinician, this is it. - Senior Talent Partner, Clinical: we're building the team behind the team. This role owns physician recruiting end to end as we scale. If any of these fit someone in your network, I'd love an intro!!! Physicians Virtual Care (Full Time) — https://lnkd.in/ebEB95kR Physicians Virtual Care (Part Time) — https://lnkd.in/eK5Hx2Uv Physicians Virtual Care (Evenings/Weekends) — https://lnkd.in/ewpVkMCB Senior Talent Partner, Clinical — https://lnkd.in/eAZQ-wdW", "hook": "We're growing fast at Counsel Health, and the clinical side of the business is leading it.", "ratio": 0.79, "band": "baseline", "name": "Michael Brown"}, {"id": "7462124553234886656", "url": "https://www.linkedin.com/posts/michaelbrown91281_i-found-a-company-actually-doing-something-activity-7462124553234886656-ABoI", "kind": "post", "date": "2026-05-18T12:58:53.061000+00:00", "reactions": 513, "comments": 90, "engagement": 603, "text": "I found a company actually doing something about it. I'm joining Counsel Health as their first Head of Talent and I could not be more fired up about it. Here's the thing about healthcare access. When something feels wrong, you're stuck choosing between googling your symptoms, asking Claude, calling your doctor who can't see you for three weeks, or ending up in an urgent care or ER that costs a fortune. Nobody wins in that scenario, and the honest truth is that sometimes every single day counts. My family deserves fast, real answers when something is wrong. So does yours. Counsel is fixing that. It's the best of both worlds. Medical grade AI combined with physician oversight, delivering answers in minutes instead of weeks. Backed by Andreessen Horowitz and GV (Google Ventures), they're already serving over 100,000 members nationwide, and the growth is just getting started. When I met Muthu Alagappan, MD, Founder and CEO, I walked away thinking this guy is building something that actually matters and is going to make a difference in the world. The mission is real, the traction speaks for itself, and the team is exactly the kind of people I want to go to work with every day. The opportunity to build the talent function at a company like this from the ground up is exactly the kind of work I want to be doing. 20 years in TA and HR, a consulting chapter that sharpened me in ways I didn't expect, and now this. Grateful to Amit Bhatt for believing in me and making it happen. To Justin Yu, Ann Kelly, Julia Siu, and Leah Nida for running a great process, I'm psyched to be partnering with you! And to McKenzie Furber at GV for the intro that started it all. Let's go.", "hook": "I found a company actually doing something about it.", "ratio": 5.91, "band": "replicable", "name": "Michael Brown"}, {"id": "7460673101391917056", "url": "https://www.linkedin.com/posts/michaelbrown91281_closing-time-every-new-beginning-comes-activity-7460673101391917056-RkCg", "kind": "post", "date": "2026-05-14T12:51:19.975000+00:00", "reactions": 189, "comments": 51, "engagement": 240, "text": "\"Closing time. Every new beginning comes from some other beginning's end.\" Door3 Talent has been one of the most creatively alive periods of my career. The AI strategy work, the training and enablement, the building. Especially the building in public. I got to work with companies I genuinely cared about, people I respected, and problems worth solving. 22 invoices sent and collected. Clients and partners that trusted me to show up and deliver: TA and People Teams at Bottomline, Career Pathways Initiative, Wistia, EvenUp, ActiveCampaign, Liberate, Rapid7, People Innovations, Workable, Manifold, Synopsys Inc., and Bond Global. Thank you! Its been a busy year. Lets just say, I've been hustling. Work ranged from AI skills training and talent strategy to executive placements and embedded HR/Talent leadership. A few honest things I learned as a solopreneur: - Selling and doing at the same time is hard. Like, actually really hard. - Your reputation is your only sales team. Every deliverable is a reference. - Building in public compounds. The tools, the content, the community. That flywheel is uber real. - The silence is louder than you expect. - And then the honest part nobody talks about enough, it's lonely. I'd do it again with a partner. But solo, there's a ceiling on what you can feel good about, not just what you can produce. - I'm also a leader. That's not ego, it's just how I'm wired. Leaders need a team. People to invest in, to develop, to go to battle with. That's not available when you're a company of one. I missed it more than I expected to and it took me a bit longer to recognize. Special thank you to Kim Schofield at Bottomline for being my very first training client. You didn't know it at the time (well maybe you did), but that first invoice meant everything. And to Elizabeth Gormley at Rapid7 for being my first AI strategy engagement. That one set the tone for everything that came after. As one door closes... I've never felt healthier about a decision in my life. More to come on that next week. It's time to shut the Door.", "hook": "\"Closing time.", "ratio": 2.35, "band": "working", "name": "Michael Brown"}, {"id": "7459977183252402176", "url": "https://www.linkedin.com/posts/michaelbrown91281_big-week-ahead-wednesday-im-at-foundation-activity-7459977183252402176-aWmO", "kind": "post", "date": "2026-05-12T14:46:00.161000+00:00", "reactions": 61, "comments": 24, "engagement": 85, "text": "Big week ahead. Wednesday I'm at Foundation Medicine in Boston with the House of Visionaries Community crew. Morning is the CPO Brunch where I'm co-presenting with Andrew Suchoff on a topic near and dear, personal branding. Then the afternoon session runs 12:30 to 4:30 with Rachel Salamone from Boston Dynamics, Andrew Suchoff and Ian Ide from Foundation Medicine, Katie Kulikoski and Stephanie Steele from Rapid7, and Ben Rutter covering Quality and Impact of Hire and How to Think Like a CEO. Two killer topics! Oh, and there's a mystery guest. Born in Boston. Icon of its industry. Truly visionary. I have theories. Anyone have ideas? Thursday I'm presenting at Maven AGI for the Scale event. Invite-only, 30-40 senior People leaders from Boston-area startups and scale-ups. The theme is Moments that Matter, automate the predictable and create wow in the moments that truly count. The agenda is stacked. Our gracious host, Lauren Murphy and team from Maven are opening with an AI Problem/Solve, the amazing Kat Cortave is presenting on building an AI agent and what she learned along the way, Amy Kruglak, SPHR from Elucid is spotlighting how they're automating people processes, and I'm up with a 20-minute talk on the lifecycle of AI tools and ROI. Then Tom Foreman runs a full interactive workshop on the future of AI and humans. Happy hour after. This is exactly the kind of room I want to be in. Shoutout to the Bond Global team for putting this all together, Ben, Christina, Tom, Laura, Sabrina, and Ryan. You build rooms worth being in!!! And to my fellow board members at House of Visionaries, Christina, Carrie, and Katie, big ups! See you there!", "hook": "Big week ahead.", "ratio": 0.83, "band": "baseline", "name": "Michael Brown"}, {"id": "7459592855926419457", "url": "https://www.linkedin.com/posts/michaelbrown91281_all-good-projects-come-to-an-end-last-activity-7459592855926419457-vI4w", "kind": "post", "date": "2026-05-11T13:18:49.386000+00:00", "reactions": 96, "comments": 6, "engagement": 102, "text": "All good projects come to an end. Last week I wrapped up with Chris McMahon and the Manifold AI team. Chris, working with you this past year has been one of the better professional relationships I've had. We built a ton!!!! We figured a lot out and somewhere in there it stopped feeling like consulting and started feeling like partnership. I'm proud of what we accomplished and where Manifold is today. I'll genuinely miss it. Thank you! This week I wrap up at Synopsys Inc. A few months in, but dense ones to be honest. This was a serious AI strategy engagement on a serious set of opportunities, and I believe the team is now in a great spot to continue pushing their strategy forward. Natalie, I enjoyed our chats, you are an incredible TA Leader. Thank you for making each week better than the last. Rob Devlin, I don't know how two bald, bearded guys from opposite sides of the Atlantic end up being the same person, but here we are. Sneakers, Wu-Tang, AI, Dogs, Empathetic leadership!!!! Two peas in a pod. Grateful for both of these engagements. Grateful for the people. More to come this week. Let's just say the next chapter has me fired up.", "hook": "All good projects come to an end.", "ratio": 1.0, "band": "baseline", "name": "Michael Brown"}, {"id": "7461050158731059201", "url": "https://www.linkedin.com/posts/milesjennings_were-now-using-ai-on-mediabistro-to-filter-activity-7461050158731059201-xxBI", "kind": "post", "date": "2026-05-15T13:49:37.450000+00:00", "reactions": 16, "comments": 1, "engagement": 17, "text": "We're now using AI on Mediabistro to filter job listings and improve the relevance to media and creative professionals. Made a huge difference - you should see a big improvement in the types of jobs posted on the site. One thing AI is good at (heck, maybe the only thing it's good at) is data analysis at scale. So we're excited about building a better experience for people. More to come!", "hook": "We're now using AI on Mediabistro to filter job listings and improve the relevance to media and creative professionals.", "ratio": null, "band": "n/a", "name": "Miles Jennings"}, {"id": "7456050337846616064", "url": "https://www.linkedin.com/posts/milesjennings_recruiting-firms-are-like-a-large-fruit-themed-activity-7456050337846616064-csde", "kind": "post", "date": "2026-05-01T18:42:07.259000+00:00", "reactions": 6, "comments": 3, "engagement": 9, "text": "Recruiting firms are like \"a large fruit-themed technology company in the Santa Clara Valley is seeking a...\" Just say it, guys, it's ok, no one wants your req | Miles Jennings", "hook": "Recruiting firms are like \"a large fruit-themed technology company in the Santa Clara Valley is seeking a...\" Just say it, guys, it's ok, no…", "ratio": null, "band": "n/a", "name": "Miles Jennings"}, {"id": "pulse:creative-media-jobs-roundup-miles-jennings-ixc7f", "url": "https://www.linkedin.com/pulse/creative-media-jobs-roundup-miles-jennings-ixc7f", "kind": "article", "date": "2026-04-24T00:00:00+00:00", "reactions": 8, "comments": 1, "engagement": 9, "text": "AI was scaring everyone for a little while, and there's still a lot of that. Everyone is worried. But then people also seemed to realize recently that there are only so many em dashes and negative parallelisms that we can all take. Businesses are looking to break through the noise, and average content will get average returns.", "hook": "AI was scaring everyone for a little while, and there's still a lot of that.", "ratio": null, "band": "n/a", "name": "Miles Jennings"}, {"id": "7471264332178206720", "url": "https://www.linkedin.com/posts/philstrazzulla_uber-just-cut-23-of-its-people-and-places-activity-7471264332178206720-MSvl", "kind": "post", "date": "2026-06-12T18:17:06.170000+00:00", "reactions": 12, "comments": 5, "engagement": 17, "text": "Uber just cut 23% of its People and Places division. The LinkedIn takes write themselves: \"AI is coming for HR.\" Except Uber explicitly said AI wasn't a factor. Read the actual memo instead. Uber President Jill Hazelbaker's words: \"HR was) too complex and fragmented, with overlapping responsibilities, unclear ownership, and teams operating too far from the businesses and partners they support.\" That memo describes an org design problem getting fixed in public. A few details worth sitting with: The cuts hit senior roles hardest. Uber still has 800+ open positions. Q1 gross bookings were up 25% year over year. A growing, profitable company looked at its HR function and decided it had grown in the wrong shape. Here's the uncomfortable part. When a People team gets cut while the business is booming, leadership is telling you they lost sight of what that team was connected to. The lesson for HR leaders is proximity and influence. Every layer between your team and the business it supports is a layer someone will eventually question. If you run a People function, ask yourself one thing: does every team I own have a clear line to a business outcome someone outside HR would name? If the answer is fuzzy, fix the structure before someone fixes it for you. What do you think actually drove this one: org complexity, cost discipline, or something else?", "hook": "Uber just cut 23% of its People and Places division.", "ratio": 0.94, "band": "baseline", "name": "Phil Strazzulla"}, {"id": "7470948962309480449", "url": "https://www.linkedin.com/posts/philstrazzulla_calling-all-boston-based-hr-professionals-activity-7470948962309480449-fKF1", "kind": "post", "date": "2026-06-11T21:23:56.134000+00:00", "reactions": 28, "comments": 3, "engagement": 31, "text": "Calling all Boston based HR professionals! I'm hosting a breakfast at the WHOOP offices in Fenway on June 23rd and would love to see you there! This is an event for those who are interested in how HR can impact the P&L. We'll be talking revenue, EBITDA, and other financial metrics. But, we'll also keep it fun, with some great food, networking, giveaways (!!), and an event space that has truly remarkable views. Hope to see you June 23rd, you can RSVP in the first comment below!", "hook": "Calling all Boston based HR professionals!", "ratio": 1.72, "band": "baseline", "name": "Phil Strazzulla"}, {"id": "7470838183941881856", "url": "https://www.linkedin.com/posts/philstrazzulla_ai-isnt-accountable-doesnt-get-a-bonus-activity-7470838183941881856-d3NK", "kind": "post", "date": "2026-06-11T14:03:44.513000+00:00", "reactions": 10, "comments": 6, "engagement": 16, "text": "AI isn't accountable, doesn't get a bonus, and doesn't care about being fired (I hope). How do you think about managing a non-deterministic entity that doesn't care about the incentives used to manage humans through the many edge cases they encounter during work?", "hook": "AI isn't accountable, doesn't get a bonus, and doesn't care about being fired (I hope).", "ratio": 0.89, "band": "baseline", "name": "Phil Strazzulla"}, {"id": "7470520447554625536", "url": "https://www.linkedin.com/posts/philstrazzulla_chief-people-officer-at-pearl-health-united-activity-7470520447554625536-bg8v", "kind": "post", "date": "2026-06-10T17:01:10.255000+00:00", "reactions": 76, "comments": 7, "engagement": 83, "text": "Posting remote HR, TA, and People roles available this week featuring companies like Instacart, Vidyard, Syndio, ServiceTitan, and many more from the US and Canada! Know of any we missed? Drop them in the comments or post on PeopleOps Jobs. Know anyone looking for a job? Please comment for reach #cfr 🙏 ⭐ Chief People Officer at Pearl Health (US Remote) $270,000 – $310,000/yr - https://hubs.la/Q04kMwD90 ⭐ Head of People & Performance at Syndio (US Remote) $200,000 – $275,000/yr - https://hubs.la/Q04kNhXp0 ⭐ Director, HR Business Partnership at Instacart (US Remote) $197,000 – $250,000/yr - https://hubs.la/Q04kWFXD0 More Opportunities: 📌 Lead Analyst, People Analytics at ServiceTitan (Canada Remote) CA$122,200 – CA$172,600/yr - https://hubs.la/Q04kN_d20 📌 Senior People Business Partner at Evolve (US Remote) $140,000 – $170,000/yr - https://hubs.la/Q04kM3Yn0 📌 Principal Talent Acquisition Partner at Redox (US Remote) $141,000 – $165,000/yr - https://hubs.la/Q04kL-1_0 📌 Senior Technical Recruiter at Muon Space (US Remote) $116,000 – $164,000/yr - https://hubs.la/Q04kN6bt0 📌 People Operations Lead at Defense Unicorns (US Remote) $116,900 – $158,100/yr - https://hubs.la/Q04kMfBV0 📌 People Operations Manager at brightwheel (US Remote) $100,000 – $150,000/yr - https://hubs.la/Q04kMSL-0 📌 Director of People at We Care Solar (US Remote) $125,000 – $140,000/yr - https://hubs.la/Q04kLWP50 📌 Senior People Operations Partner at Vidyard (Canada Remote) CA$105,000 – CA$128,000/yr - https://hubs.la/Q04kWWBz0 📌 Employee Relations Specialist at Iron Mountain (Canada Remote) CA$88,102 – CA$117,500/yr - https://hubs.la/Q04kN8lf0 ➕ Many more on PeopleOps Jobs Best of luck to everyone on the job hunt! 🙌", "hook": "Posting remote HR, TA, and People roles available this week featuring companies like Instacart, Vidyard, Syndio, ServiceTitan, and many more…", "ratio": 4.61, "band": "working", "name": "Phil Strazzulla"}, {"id": "7470492302344552449", "url": "https://www.linkedin.com/posts/philstrazzulla_what-roles-are-openai-and-anthropic-hiring-activity-7470492302344552449-QMIT", "kind": "post", "date": "2026-06-10T15:09:19.914000+00:00", "reactions": 10, "comments": 1, "engagement": 11, "text": "What roles are OpenAI and Anthropic hiring for, and what does it imply about the future of work? Well, my friend Yash Ambardekar put together an analysis to answer just that! Some of the findings: - Of the >1K open roles, only 4 are entry level! - Sales and GTM are two of the biggest areas of hiring. It's a function of their growth, but also that large enterprise deals still need lots of humans - There are only 18 support roles, for products that serve hundreds of millions of users - Nearly 10% of roles relate to trust and safety, which I view as generally \"AI oversight\" If you want to explore, here is the data set: https://lnkd.in/ePXCRvSX Curious what stands out to you!", "hook": "What roles are OpenAI and Anthropic hiring for, and what does it imply about the future of work?", "ratio": 0.61, "band": "baseline", "name": "Phil Strazzulla"}, {"id": "7470228217115807745", "url": "https://www.linkedin.com/posts/philstrazzulla_employeeengagement-leadershipdevelopment-activity-7470228217115807745-iUeN", "kind": "post", "date": "2026-06-09T21:39:57.089000+00:00", "reactions": 16, "comments": 3, "engagement": 19, "text": "Many organizations still treat employee disengagement as a mood issue rather than a systemic one. It is a common trap to rely on superficial perks like ping-pong tables instead of fixing the root causes. Consider these insights shared by Malvika Jethmalani on why current strategies often miss the mark: *   Systemic problems require structural solutions, not just individual interventions. *   70% of employee engagement variance is directly tied to the immediate manager. *   Engagement is a leadership responsibility, not just an HR department task. The focus needs to shift toward empowering line managers to cultivate better day-to-day environments. What is the single most effective way you have seen a manager improve team morale? #EmployeeEngagement #LeadershipDevelopment #WorkplaceCulture #ManagementTips #HRStrategy #BusinessGrowth", "hook": "Many organizations still treat employee disengagement as a mood issue rather than a systemic one.", "ratio": 1.06, "band": "baseline", "name": "Phil Strazzulla"}, {"id": "7471552536148332544", "url": "https://www.linkedin.com/posts/traciesponenberg_building-is-not-optional-for-me-as-the-founder-activity-7471552536148332544-xSy_", "kind": "post", "date": "2026-06-13T13:22:19.351000+00:00", "reactions": 24, "comments": 1, "engagement": 25, "text": "Building is not optional for me as the founder and Chief People Officer of my own company. The work with my clients is the heart of what I do, but a significant portion of my time goes into building, from my newsletter to my book to exclusive tools for my distribution and manufacturing subscribers (watch for the latest in a few days - it’s one I get asked for often!) to the future of my business, to so much more. I’m a strategist, but I’m also a builder. And if I were still in the corporate world, I would definitely be a builder. If you are leading HR or People teams, even as a department of one, building is no longer optional. The tools exist now for you to build the things you’ve always wished you had. The onboarding experience you sketched out but never had budget for. The manager toolkit living in your head. The process you know would save your team hours every week. You don’t need a developer. You don’t need a big budget. You need curiosity and a willingness to start before you feel ready. The HR leaders who will matter most over the next few years aren’t the ones waiting for someone to hand them a solution. They’re the ones rolling up their sleeves and making the thing. So build. Start small. Start messy. Start with the problem that’s been nagging at you the longest. Building isn’t optional for me. And it’s not optional for you either.", "hook": "Building is not optional for me as the founder and Chief People Officer of my own company.", "ratio": 0.41, "band": "baseline", "name": "Tracie Sponenberg"}, {"id": "7470883545444687873", "url": "https://www.linkedin.com/posts/traciesponenberg_almost-every-time-i-stepped-on-stage-this-activity-7470883545444687873-h_SS", "kind": "post", "date": "2026-06-11T17:03:59.538000+00:00", "reactions": 26, "comments": 0, "engagement": 26, "text": "Almost every time I stepped on stage this year, my keynotes touched on work redesign in some way. Next week, I'm thrilled to join Hacking HR again, this time moderating a panel on \"Work Redesign is Where the Real Value Lives\" for the AI Experience Summit. A topic I love, and that's closely tied to the work I do on stage and wtih clients. This event explores how organizations are navigating the real impact of AI across leadership, strategy, workforce readiness, trust, governance, and ethics. Across the event, you'll be able to attend panels on on topics such as AI leadership, alignment, scaling from pilots to platforms, agentic AI in practice, measuring real impact, managing risk and regulation, and ensuring human judgment, inclusion, and psychological safety remain central as AI becomes embedded across work. Register here: https://lnkd.in/ejUyh-nr This is a fully FREE and VIRTUAL event! And it offers a FREE diploma of completion for attendees!", "hook": "Almost every time I stepped on stage this year, my keynotes touched on work redesign in some way.", "ratio": 0.42, "band": "baseline", "name": "Tracie Sponenberg"}, {"id": "7470439652647411713", "url": "https://www.linkedin.com/posts/traciesponenberg_a-week-later-and-i-cannot-stop-thinking-activity-7470439652647411713-6GXE", "kind": "post", "date": "2026-06-10T11:40:07.248000+00:00", "reactions": 56, "comments": 9, "engagement": 65, "text": "A week later, and I cannot stop thinking about the magic of DisruptHR - Manchester, NH. I had a very long road bringing DisruptHR back to the stage in my home state, navigating grief and loss and a pandemic and leaving the corporate world and a lot more. But it finally happened! When I bought the license a couple years ago, I figured we'd hold a small event with a few speakers. Turns out, the right partner changes everything, and a large, 200 person event later, complete with a cool venue and espresso and Deadproof pizza, we're back and I am so energized for the next one. Last week I thanked Ryan and Alex, this week I want to thank our incredible speakers. When you have a lineup with 17 speakers each giving five minute talks, you hope that you have a few standout talks. But that's not what happened on June 3. Every single one was incredible. From Angela kicking it off with \"when your CEO is an @$$hole\" to Dirk closing with \"Half a Sacred Life\", and with everyone in between, we talked about the things we don't talk about enough in HR. And every speaker gave everything they had, sharing personal stories openly and vulnerably, and giving the audience real, practical takeaways. All in five minutes each. There aren't enough words to thank the speakers. So I'll just say thank you from the bottom of my heart. You are all amazing. Angela Cheng-Cimini 鄭婷婷 Pasha Marlowe, MFT Michelle Strasburger Keisha O'Marde-Jack, PHR, SHRM-CP Rebecca Conners Bruce Nichols Hema Crockett Laura Tomaino Jillian Granucci Anderson Alexis Davis, PHR, sHRBP Kelly Casey Risa Taylor Caroline Fleming, sHRBP, SHRM-CP, MBA Fleming Janelle Gorman Brooke Neva Sullivan Shelly Masson Dirk Beveridge And if you were there, or missed it and wanted to be there, watch our page for the videos. They will be released in the coming weeks! And if you want an incredible recap of the event and of each talk, check out what Leah Stackhouse wrote yesterday!", "hook": "A week later, and I cannot stop thinking about the magic of DisruptHR - Manchester, NH.", "ratio": 1.06, "band": "baseline", "name": "Tracie Sponenberg"}, {"id": "7469726908214317056", "url": "https://www.linkedin.com/posts/traciesponenberg_ive-learned-that-i-do-my-best-work-by-having-activity-7469726908214317056-b0My", "kind": "post", "date": "2026-06-08T12:27:55.733000+00:00", "reactions": 37, "comments": 9, "engagement": 46, "text": "I've learned that I do my best work by having many things going on at once. And now that I'm two and a half years into my business that focuses on frontline companies, I am able to build and grow in a way I would not have expected. Here are just a few things I'm working on, in addition to the client work I love. These things are exclusively for those of you working in small and midsized businesses that make and move things: My book! Title to be announced soon, and to be published in September. VERY sector specific to the frontline, packed with my frameworks and thoughts and more. It's meant to be used, not just read. A proprietary culture diagnostic exclusively for frontline companies. I was working on this for a long time, and used variations of it before I got it to the point it's at today. It's incredibly impactful and extremely detailed. I kind of fought stand alone projects for awhile, but not anymore. I've loved visiting the companies who engaged with me to do this! New keynotes! While all of my keynotes are tailored for specific audiences, I've been building a lot behind the scenes, weaving in stories and data and things that can only come from someone who has worked in frontline companies for decades. And an event designed just for HR leaders in small and midsized frontline companies. This is in the very early stages, but I'm hoping to run the first small event by the end of 2026. This will represent everything I wish I had early in my career. A website refresh. Clearly focused on the work I'm doing now, for companies in distribution, manufacturing, and beyond. A webinar with Allvoices, strictly focused on frontline companies. Next month. Details shortly. Frontline companies are having a moment. It's about time!! But so much out there focuses on really large companies. I'm trying to change that. Much more soon!", "hook": "I've learned that I do my best work by having many things going on at once.", "ratio": 0.75, "band": "baseline", "name": "Tracie Sponenberg"}, {"id": "7469441962329219073", "url": "https://www.linkedin.com/posts/traciesponenberg_ive-spent-30-years-looking-for-the-room-activity-7469441962329219073-Ltvt", "kind": "post", "date": "2026-06-07T17:35:39.340000+00:00", "reactions": 53, "comments": 5, "engagement": 58, "text": "I've spent 30 years looking for the room built for small HR teams and departments of one in the businesses that make and move things. It doesn't exist. You know what I do when I can't find something...... I build it. More soon!", "hook": "I've spent 30 years looking for the room built for small HR teams and departments of one in the businesses that make and move things.", "ratio": 0.94, "band": "baseline", "name": "Tracie Sponenberg"}, {"id": "7469351312728563712", "url": "https://www.linkedin.com/posts/traciesponenberg_last-week-was-so-packed-with-excitement-and-activity-7469351312728563712-NkHj", "kind": "post", "date": "2026-06-07T11:35:26.791000+00:00", "reactions": 61, "comments": 6, "engagement": 67, "text": "Last week was so packed with excitement and emotion and exhaustion, I’m still cocooning and recovering! From the one year anniversary of my Dad’s death, I went straight into the incredible high of DisruptHR, which was everything I hoped it would be and so much more. Then Boston the following day for a Transform dinner. And through it all, getting to spend a lot of family time, and time with Alex. Saturday was a quiet day in town and at home, with coffee and scones with Dave and Jackson at Table. Sometimes I try to look at things in our hometown through the eyes of a tourist. If we stumbled on this place through our travels through Vermont, what would we think? Table is one of these adorable tucked away places, with great food, that we’d be in awe of.and it’s right in the heart of downtown Concord. I’m grateful for this past week, the friends who spoke and supported Disrupt. My family who was there to support me. And that we have so many quiet little places in the middle of our city, where I can get away without actually going away. Which is kind of nice sometimes!", "hook": "Last week was so packed with excitement and emotion and exhaustion, I’m still cocooning and recovering!", "ratio": 1.09, "band": "baseline", "name": "Tracie Sponenberg"}, {"id": "7468726835514777600", "url": "https://www.linkedin.com/posts/traciesponenberg_meet-my-friend-melissa-fisk-phr-shrm-cp-activity-7468726835514777600-QWvg", "kind": "post", "date": "2026-06-05T18:13:59.821000+00:00", "reactions": 104, "comments": 4, "engagement": 108, "text": "Meet my friend Melissa Fisk, PHR, SHRM-CP. Chief People Officer, DisruptHR - Manchester, NH committee member, and so much more. Melissa is the reason I’m a keynote speaker! Ten years ago a conversation with her led me to saying yes to getting on a stage for the very first time. That led to many other local opportunities. Which gave me the confidence to apply to a big stage in Vegas. Which led to everything else. I had not seen her in person for a very long time. But we got to spend a few minutes together at Disrupt this week. One conversation. One nudge. One “you should do this.” That can change our careers. That can change us. Melissa did that for me. And I’m not sure she even knows the full ripple effect of that one conversation a decade ago. (Though she does now!) Who saw something in you, opened a door, or gave you the push you needed? Tag them below!", "hook": "Meet my friend Melissa Fisk, PHR, SHRM-CP.", "ratio": 1.76, "band": "baseline", "name": "Tracie Sponenberg"}, {"id": "7468366473778974720", "url": "https://www.linkedin.com/posts/traciesponenberg_our-last-disrupthr-manchester-nh-was-in-activity-7468366473778974720-RpV1", "kind": "post", "date": "2026-06-04T18:22:02.888000+00:00", "reactions": 135, "comments": 18, "engagement": 153, "text": "Our last DisruptHR - Manchester, NH was in 2019. I had incredibly high expectations for the first event in seven years. That doesn’t always work out. But yesterday, it did in the most beautiful way. Every expectation I had was exceeded, from the venue to the food and coffee (hey Espresso Dave and Deadproof!)to the speakers. The SPEAKERS. WERE. UNBELIEVABLE! More posts thanking all of you soon but for now, two people to thank. Alex Seiler for being my co-emcee, and for having the best walk up song! Thanks for flying out to do this, for hanging with my family, and for just being you. And Ryan Rourke. The most amazing co-host. When I said all I wanted to do was pick the speakers, I didn’t know that Ryan and OneDigital would handle everything. But they did! Everything! Having the license to this chapter is so personal and meaningful to me. Bringing something really different to my home state, something I wish I had years ago, I’m so grateful to get to do. And I could not have had a better co-host. Thank you Alex. And thank you Ryan!", "hook": "Our last DisruptHR - Manchester, NH was in 2019.", "ratio": 2.49, "band": "working", "name": "Tracie Sponenberg"}, {"id": "7467946406729662465", "url": "https://www.linkedin.com/posts/traciesponenberg_hope-to-see-you-there-today-activity-7467946406729662465-PMYk", "kind": "post", "date": "2026-06-03T14:32:51.099000+00:00", "reactions": 13, "comments": 2, "engagement": 15, "text": "With all due respect to Miss Congeniality,the perfect date is actually June 3rd #iykyk The one thing I couldn’t control? The weather…. and it’s perfect. We’ve got a food truck, beverage truck, and live music…. out on the patio. Ah, that feels good to say! DisruptHR - Manchester, NH is today!!!! Come see what myself and Tracie Sponenberg have in store for you. 17 dazzling speakers, and we are technically SOLD OUT, But if you wanted to swing by last minute or bring a colleague along, we can make it happen. The event planner in me always builds in a buffer:) Looking forward to seeing you all today. Lets set the standard for what a DisruptHR event looks like! OneDigital #OneDigitalEast", "hook": "With all due respect to Miss Congeniality,the perfect date is actually June 3rd #iykyk The one thing I couldn’t control?", "ratio": 0.24, "band": "baseline", "name": "Tracie Sponenberg"}, {"id": "7467546550282481665", "url": "https://www.linkedin.com/posts/traciesponenberg_one-year-ago-today-we-lost-my-dad-grief-activity-7467546550282481665-PgWp", "kind": "post", "date": "2026-06-02T12:03:57.893000+00:00", "reactions": 161, "comments": 25, "engagement": 186, "text": "One year ago today, we lost my dad. Grief is weird and awful and also a very strange gift that I never wanted. When I lost my mom, it was horrible but expected. I was grieving within a community of the workplace, and large communities formed at the beginning of 2020. That, and navigating pandemic response for my company, I thought, saved me. I threw myself into work, taking no time off. It turns out all that just delayed the inevitable burnout, which showed up a year and a half later. When I lost my dad, it was completely unexpected. I was grieving as a solopreneur. No teammates, no workplace. But I had communities of support that helped a lot. And I had incredibly understanding clients. I took about two weeks off to process and heal, and that made an huge difference. I had learned how to grieve in a way that worked for me. I learned what I needed, and how to lean on others. I'm not always great at regular communication with my friends or communities. But I do show up. And they did for me, in many ways this past year. So many offers to step in to help with clients. Kind gifts of food and coffee (the ones who know me well!) The friends who showed up at my dad's service, outside on one of the hottest days of the year. That means more than I could ever possibly express. I miss my dad every day. I loved that he finally understood the work I did - which is very varied and not always easy to explain! I love hearing from his clients that he shared so much about me, my family and my brother and his family, that they felt like they knew us. I loved his unique relationship with each of our kids, who he always loved exactly as they were. I loved that he grew so fond of selfies that he would ask me to take them and share them. (And I'm grateful I have so many now, like the one below!) I miss the happy birthday calls, the Happy Easter texts, the random calls, \"Hey Trace, you want me to pick up some corn at McQuesten's?\" whenever he golfed near the farm (which was a lot!) I miss the constant presence he was in our lives. He always showed up, he was always there, and you never had any doubt that you were loved. I got to love him for so long. And out of grief and loss, I got to know some of his friends. I get to have his very best friend in my life now, who supports me and watches out for me like my dad would have wanted him to. I get to learn stories about him, and share the funniest stories about him with our kids. It's not the same. It won't ever be the same. But it is something. Having loved my dad (and my mom), and being loved by them, for so long was a true gift that many people don't get to have. My dad always showed up. No question, no hesitation, no doubt that you were loved. And the best way I know to honor him is to try to live up to it, with my family, my friends, my clients, my communities. Show up. Be there. Let the people in your life know they are loved. He made it look easy. I'm still working on it!", "hook": "One year ago today, we lost my dad.", "ratio": 3.02, "band": "working", "name": "Tracie Sponenberg"}];
const AUTHORS = ["Adriano Herdman", "Alex Seiler", "Amy Mencarelli", "Ben Eubanks", "Cammas Freeman", "Charly Wargnier", "Daniel Space", "Glen Cathey", "Hannah Morgan", "Hung Lee", "Keri Ohlrich", "Kieran Snyder", "Kyle Lagunas", "Lars Schmidt", "Liz Ryan", "Louise Triance", "Michael Brown", "Miles Jennings", "Phil Strazzulla", "Tracie Sponenberg"];
const grid = document.getElementById('grid');
const $ = id => document.getElementById(id);

AUTHORS.forEach(a => { const o=document.createElement('option'); o.value=a; o.textContent=a; $('author').appendChild(o); });

function fmt(n){ return (n||0).toLocaleString('en-US'); }
function dateStr(iso){ return (iso||'').slice(0,10); }

function render(){
  const sort=$('sort').value, author=$('author').value, band=$('band').value, q=$('q').value.toLowerCase();
  const win=+$('window').value, cutoff = win ? Date.now()-win*86400000 : 0;
  let rows = POSTS.filter(p=>{
    if(author && (p.name||p.handle)!==author) return false;
    if(band && p.band!==band) return false;
    if(cutoff && (!p.date || new Date(p.date).getTime() < cutoff)) return false;
    if(q && !((p.hook||'')+' '+(p.text||'')).toLowerCase().includes(q)) return false;
    return true;
  });
  rows.sort((a,b)=>{
    if(sort==='date') return (b.date||'').localeCompare(a.date||'');
    if(sort==='engagement') return (b.engagement||0)-(a.engagement||0);
    return (b.ratio||0)-(a.ratio||0);
  });
  grid.innerHTML='';
  if(!rows.length){ grid.innerHTML='<div class="empty">No posts match.</div>'; return; }
  for(const p of rows){
    const band = p.band||'na';
    const ratio = p.ratio!=null ? p.ratio.toFixed(1)+'×' : '—';
    const card=document.createElement('div'); card.className='card';
    card.innerHTML = `
      <div class="top">
        <span class="pill b-${band}">${band}</span>
        <span class="kind">${p.kind||'post'}</span>
        <span>${dateStr(p.date)}</span>
        <span class="ratio">${ratio}</span>
      </div>
      <div class="hook">${esc(p.hook||'(no text)')}</div>
      <div class="who"><b>${esc(p.name||p.handle||'')}</b></div>
      <div class="meta">
        <span>👍 <b>${fmt(p.reactions)}</b></span>
        <span>💬 <b>${fmt(p.comments)}</b></span>
        <a class="link" href="${p.url}" target="_blank" rel="noopener">open ↗</a>
      </div>
      ${p.text && p.text!==p.hook ? '<div class="more">show full text ▾</div>' : ''}
      <div class="body">${esc(p.text||'')}</div>`;
    const more=card.querySelector('.more');
    if(more) more.onclick=()=>{ card.classList.toggle('open');
      more.textContent = card.classList.contains('open') ? 'hide full text ▴' : 'show full text ▾'; };
    grid.appendChild(card);
  }
}
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
['sort','author','band','window','q'].forEach(id=>$(id).addEventListener('input',render));
render();
</script>
</body>
</html>
