<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --line:#21262d; --ink:#e6edf3;
    --mut:#8b949e; --acc:#4493f8; --warm:#d29922; --hot:#db6d28; --fire:#f85149;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:15px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}

  .sub{color:var(--mut);font-size:13px;margin-top:4px}
  .controls{display:flex;flex-wrap:wrap;gap:10px;padding:16px 32px;
    position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--line);z-index:5}
  select,input{background:var(--panel);color:var(--ink);border:1px solid var(--line);
    border-radius:8px;padding:8px 10px;font-size:13px}
  input{flex:1;min-width:180px}
  main{padding:22px 32px;display:grid;gap:14px;
    grid-template-columns:repeat(auto-fill,minmax(360px,1fr))}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:16px 18px;display:flex;flex-direction:column;gap:10px}
  .top{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--mut)}
  .pill{font-weight:600;font-size:11px;padding:2px 8px;border-radius:999px;
    text-transform:uppercase;letter-spacing:.04em}
  .b-breakout{background:rgba(248,81,73,.15);color:var(--fire)}
  .b-replicable{background:rgba(219,109,40,.15);color:var(--hot)}
  .b-working{background:rgba(210,153,34,.15);color:var(--warm)}
  .b-baseline{background:rgba(139,148,158,.12);color:var(--mut)}
  .b-na{background:rgba(139,148,158,.12);color:var(--mut)}
  .kind{font-size:11px;color:var(--mut);border:1px solid var(--line);
    border-radius:6px;padding:1px 6px;text-transform:lowercase}
  .ratio{margin-left:auto;font-variant-numeric:tabular-nums;font-weight:700;color:var(--ink)}
  .hook{font-size:16px;line-height:1.35;font-weight:600;letter-spacing:-.01em}
  .who{font-size:13px}
  .who b{color:var(--ink)} .who span{color:var(--mut)}
  .meta{display:flex;gap:16px;font-size:13px;color:var(--mut);
    font-variant-numeric:tabular-nums;align-items:center}
  .meta b{color:var(--ink)}
  .body{font-size:13px;color:#c9d1d9;white-space:pre-wrap;display:none;
    border-top:1px solid var(--line);padding-top:10px}
  .card.open .body{display:block}
  a.link{color:var(--acc);text-decoration:none;font-size:12px;margin-left:auto}
  .more{color:var(--mut);font-size:12px;cursor:pointer;user-select:none}
  .empty{color:var(--mut);padding:40px;text-align:center;grid-column:1/-1}
</style>

<script>
const POSTS = [{"id": "7470372840840802304", "url": "https://www.linkedin.com/posts/adrianoherdman1_if-youre-a-head-of-ta-and-you-havent-updated-activity-7470372840840802304-TAcr", "kind": "post", "date": "2026-06-10T07:14:38.072000+00:00", "reactions": 220, "comments": 761, "engagement": 981, "text": "If you're a Head of TA and you haven't updated your hiring bar in the last 12 months, AI just made it obsolete. We built a free interactive guide to help you fix that. 1. The Shift- what crossed a threshold over winter 2025, and why the signals you've been hiring on no longer predict performance 2. By Function - Engineering, GTM, Design: old signals vs. new, side by side, with the specific markers that are losing predictive value in each 3. Skills Matrix - every competency, filterable by function, mapped from junior to senior, with a clear definition of what solid looks like vs. what exceptional looks like 4. The JD Rebuilder - see exactly what to cut, what to replace it with, and why. Copy-ready language for Engineering, GTM, and Design, ready to drop straight in 5. Interview Guide - 7 questions built to surface candidates who've adapted to AI, each one comes with what it signals, and the green and red flags. 6. Candidate Scorecard - a live scorecard. Rate candidates across five dimensions in real time and get an instant read on where they land Free. Interactive. 👉 Comment \"AI GUIDE\" and I'll send you the link.", "hook": "If you're a Head of TA and you haven't updated your hiring bar in the last 12 months, AI just made it obsolete.", "ratio": 2.41, "band": "working", "name": "Adriano Herdman"}, {"id": "7470010007787544577", "url": "https://www.linkedin.com/posts/adrianoherdman1_we-need-to-be-an-ai-native-talent-function-activity-7470010007787544577-ZgoV", "kind": "post", "date": "2026-06-09T07:12:51.931000+00:00", "reactions": 29, "comments": 6, "engagement": 35, "text": "We need to be an AI-native talent function! It comes up at the leadership meets. The Head of TA nods along and then is left holding the hot potato. And most of the time, it means nothing. Because whoever said it usually can’t follow it with anything concrete. “Figure out the AI thing before we open more roles” is where the sentence ends. No example. No idea what good actually looks like. That’s not a strategy. It’s a wish with a deadline attached. Heads of TA, here’s what’s getting blurred: Your recruiters can absolutely use AI to move faster. Sourcing, screening, writing up notes, all quicker. But speed isn’t reinvention. They’re optimising the job they already have. But. Rethinking how you hire altogether isn’t their call to make. It’s yours,  And you can’t rethink anything if you’ve never touched the tools yourself. You won’t think to ask: “Can we map every engineer at our 4 closest competitors, sort them by tenure and tech stack, and flag who’s likely to move this quarter?”, because you don’t know that’s now a 45-minute job instead of a 1-week project. The questions worth asking only surface once you’ve actually been in there, hands dirty, seeing what’s possible. A Head of TA who’s a beginner at this can’t lead it. You can’t be a thought partner to your team while waiting for them to hand you a deck you don’t know how to evaluate. And this runs all the way up. The CPO mandating it to their Head of TA. The CEO mandating it to the exec team. If you’re the one saying “we need to be AI-native” and you’ve never built and got your hands dirty, you’re passing down a slogan and calling it direction. The people getting ahead right now are doing it the other way round. They start with what the tools can actually do, then build the hiring strategy from there. Capability first, strategy second. If you want to lead hiring through this shift, get in the tools. Talking about them isn’t the same thing.", "hook": "We need to be an AI-native talent function!", "ratio": 0.09, "band": "baseline", "name": "Adriano Herdman"}, {"id": "7469649875362578432", "url": "https://www.linkedin.com/posts/adrianoherdman1_how-talent-acquisition-teams-are-using-claude-activity-7469649875362578432-R7oN", "kind": "post", "date": "2026-06-08T07:21:49.670000+00:00", "reactions": 490, "comments": 30, "engagement": 520, "text": "How talent acquisition teams are using Claude in 2026. We ran conversations and research against Anthropic's guidance to map how they deploy Claude Result: 8 workflows, ranked by what shows up in the wild. Chat dominates. Screening, outreach, JDs, interview prep. The story is Claude Code and Cowork. Non-technical recruiters pointing Code at ATS exports. Cowork on resume folders. Tasks that took 4 hours now take 15 minutes. Then there's the edge: MCP servers into Greenhouse, Lever, Ashby. Live pipeline Q&A. Passive candidate nurturing loops. The productivity gap is widening. Any you'd add?", "hook": "How talent acquisition teams are using Claude in 2026.", "ratio": 1.28, "band": "baseline", "name": "Adriano Herdman"}, {"id": "7468199860257603585", "url": "https://www.linkedin.com/posts/adrianoherdman1_recruiters-keep-getting-told-ai-is-coming-activity-7468199860257603585-ms2C", "kind": "post", "date": "2026-06-04T07:19:59.129000+00:00", "reactions": 48, "comments": 8, "engagement": 56, "text": "Recruiters keep getting told AI is coming for their jobs. A product team at Anthropic accidentally convinced me of the exact opposite. Lenny Rachitsky shared his takeaways from a conversation with Catherine Wu, who runs Product for Claude Code, on how Anthropic actually builds. It was aimed at product people. But read it as a recruiter and the parallel hits you in the face. Their best engineers now go from user feedback to shipped product in a week. Solo. Because AI strips out the parts that used to need a whole team. The point was never speed. The point is that the smallest effective unit became one person with good judgement and the right tools. Here's where it gets interesting for us. That's the recruiter story too (if you let it be) One recruiter with AI in the loop can: - Write the spec - Build the intake brief - Prep the candidate pack - Draft the outreach …in the time it used to take to do just one of them. That's not a reason to shrink a team. It's leverage. The recruiters who pick this up aren't doing the same job faster. They're operating a level above the ones who don't. But the bigger unlock isn't time. It's quality. Every spec sharper. Every brief more thorough. Every message grounded in real outreach methodology instead of the same tired template. It's a sharp colleague reviewing your work before it goes out and pushing it higher. On every task. All day. Specs drafted straight off the hiring manager conversation. Candidate packs generated in minutes. Talent maps and TAM analysis that used to eat a full day. None of it replaced a recruiter. It raised the floor under all of them. And here's the part the engineering parallel can't reach: We work with people, not code. AI can draft the spec and the message. It cannot tell you who's right for a role, a manager and a team. The tools raise your ceiling. They don't touch the judgement that was always the actual job. So the real question for anyone running a TA function: Are you using AI to do the same work cheaper? Or to make your recruiters operate a level higher? Because those two go to very different places. Curious where you land on that one. 👇", "hook": "Recruiters keep getting told AI is coming for their jobs.", "ratio": 0.14, "band": "baseline", "name": "Adriano Herdman"}, {"id": "7467853599260196864", "url": "https://www.linkedin.com/posts/adrianoherdman1_claude-cowork-for-recruiters-activity-7467853599260196864-Bbgk", "kind": "post", "date": "2026-06-03T08:24:04.074000+00:00", "reactions": 381, "comments": 26, "engagement": 407, "text": "The average recruiter loses a full day every week to admin. None of it fills a role. Pipeline updates. Interview scheduling. Debrief notes. Offer letter drafts. Slack updates the hiring manager will forget to read. Time that should be going into actual hiring conversations. We've been building these workflows at Move and running them on live searches over the last few months. So we pulled together 14 Claude workflows we use ourselves, grouped by what recruiters actually do in a week: 1. Sourcing & targeting 2. Screening & decisions (shortlists, debrief summaries) 3. Outreach & marketing (candidate emails, inbound triage, LinkedIn assets) 4. Client & team reporting 5. Role ops (intake pack, scheduling, offer letters) Every row has the prompt to copy, the connectors needed, and a cadence. No agents to build. No code. You connect Drive, Notion, Gmail, Slack, Calendar, paste the prompt, type /schedule. You don't need to implement all 14 this week. Pick one. Get an hour back. Pick another next week. Raise the bar one workflow at a time. Everything here is human-in-the-loop. No yes/no decision gets made without the recruiter signing off. Claude facilitates the work and raises the floor on quality but the recruiter is the arbiter of every decision, and the arbiter of the inputs those decisions are made on. Built for those who'd rather spend their week talking to candidates than typing notes about them.", "hook": "The average recruiter loses a full day every week to admin.", "ratio": 1.0, "band": "baseline", "name": "Adriano Herdman"}, {"id": "7467469009555365888", "url": "https://www.linkedin.com/posts/adrianoherdman1_if-youre-a-head-of-ta-running-sourcing-activity-7467469009555365888-tevZ", "kind": "post", "date": "2026-06-02T06:55:50.743000+00:00", "reactions": 271, "comments": 1186, "engagement": 1457, "text": "🧰 If you're a Head of TA running sourcing and relying on InMail, you're leaving 80% of replies on the table. This playbook fixes it. The best candidates for your hardest roles aren't applying. They're passive. Inbound won't reach them. And the stakes have never been higher. A senior engineer with AI tools today produces 5–10x what they produced in 2023. A bad senior hire now costs 5–10x more than two years ago. Who you hire, and whether you can reach them at all, compounds in ways it didn't before. Most teams are running outbound on InMail: one message, no follow-up, no feedback loop. That's not a sourcing strategy. It's a lottery. We've spent 5 years building and running sourcing campaigns across AI, engineering, GTM, and senior specialist roles. Hundreds of hires. We wrote down everything that works. It's called the Move Outbound Playbook. It's free. Inside: - How to run persona interviews before a single message is written - Message architecture that generates 40%+ reply rates - Why email sequences outperform InMail, with the cost data to prove it - How to map a talent market before you start sourcing, not after - How to turn rejection data into your most valuable hiring intelligence - The exact framework behind every campaign we run across the UK Europe, North America, and the Middle East. Comment \"Outbound\" below and I'll send it over.", "hook": "🧰 If you're a Head of TA running sourcing and relying on InMail, you're leaving 80% of replies on the table.", "ratio": 3.58, "band": "working", "name": "Adriano Herdman"}, {"id": "7467116324763095040", "url": "https://www.linkedin.com/posts/adrianoherdman1_the-anatomy-of-a-recruiter-screen-activity-7467116324763095040--CJd", "kind": "post", "date": "2026-06-01T07:34:24.136000+00:00", "reactions": 111, "comments": 9, "engagement": 120, "text": "Most TA teams don't measure one of the highest-leverage moments in the hiring process. The recruiter screen. Here are 6 steps Heads of TA can apply this quarter to improve their talent partner's highest leverage moment. And make a material impact on pipeline and hire quality. AI has raised the floor on sourcing, outreach, scheduling, written comms. The recruiter screen is now the edge. We’ve pulled together the research from 4 disciplines that almost never talk to each other: 1. Sales discovery science   2. Structured interviewing research  3. Psychology of rapport   4. Candidate experience 11 slides. Scroll through ↓ Tag a Talent pro who might be interested.", "hook": "Most TA teams don't measure one of the highest-leverage moments in the hiring process.", "ratio": 0.29, "band": "baseline", "name": "Adriano Herdman"}, {"id": "7466008649711136768", "url": "https://www.linkedin.com/posts/adrianoherdman1_move-sourcing-engine-recent-hires-activity-7466008649711136768-485s", "kind": "post", "date": "2026-05-29T06:12:53.824000+00:00", "reactions": 22, "comments": 3, "engagement": 25, "text": "10 hires. 60 days. £232K saved vs agencies. That's what our Sourcing Engine has delivered for AI-native startups, FinTech scale-ups and HealthTechs over the last two months. Average time-to-hire: 31 days. A snapshot: → Staff AI Engineer, UK / 40 days → Lead React Native Engineer, UK / 21 days → Senior AE, FinTech scale-up (USA) / 28 days → Senior Frontend Engineer, HealthTech (USA) / 25 days Plus 6 more across AI/ML, Engineering and GTM. No retainer trap. No 25% agency fees. No candidate lock-in. Just senior-led market mapping, multi-step campaigns tested live in-market, and every candidate handed straight into your ATS. The full breakdown: roles, salaries, locations, time-to-hire, is on this one-pager. If you want to know how we go about doing this, reach out.", "hook": "10 hires.", "ratio": 0.06, "band": "baseline", "name": "Adriano Herdman"}, {"id": "7465290422530068480", "url": "https://www.linkedin.com/posts/adrianoherdman1_60-claude-ta-prompts-activity-7465290422530068480-hH_c", "kind": "post", "date": "2026-05-27T06:38:55.120000+00:00", "reactions": 990, "comments": 2109, "engagement": 3099, "text": "60 Claude prompts for Talent Acquisition↓ For in-house Heads of TA, recruiters, sourcers. 5 are shown in full (prompt + sample output): ↳ Post-Intake Job Brief ↳ Personalised LinkedIn Outreach ↳ CV-to-Brief Comparison ↳ HM Prep Brief ↳ Decline Message that Builds Advocacy + 55 more listed across 10 categories. Comment \"BANK\" I'll DM the link. All 60 ready-to-copy. Free, instant. (Plus the full playbook with deeper prompts, sample outputs, and 30+ extras on a notion page)", "hook": "60 Claude prompts for Talent Acquisition↓ For in-house Heads of TA, recruiters, sourcers.", "ratio": 7.61, "band": "replicable", "name": "Adriano Herdman"}, {"id": "7470123810600640512", "url": "https://www.linkedin.com/posts/alexseiler_picture-the-last-calibration-meeting-you-activity-7470123810600640512-dKUe", "kind": "post", "date": "2026-06-09T14:45:04.636000+00:00", "reactions": 21, "comments": 10, "engagement": 31, "text": "Picture the last calibration meeting you were in. Someone said \"she's just not ready yet.\" Nobody asked what ready means. Nobody pushed back. It moved on. That moment — that one unexamined sentence — is how bias gets baked into promotion decisions while everyone in the room believes the process was fair. It's not a bad intentions problem. It's a bad system problem. Thursday I'm going live to talk about what a better system looks like. 🎙️ The Meeting of the Minds: Smarter Calibration, Stronger Succession 📅 June 11 | 11:30 AM ET | YouTube Live With Amy Jenkins (Engagedly Inc) + Marnie Robbins (PHR Brand Partnerships Network) Calibration. Succession. The 9-box. AI's actual role. 30 minutes. Link in Comments.", "hook": "Picture the last calibration meeting you were in.", "ratio": 0.4, "band": "baseline", "name": "Alex Seiler"}, {"id": "7469406990025515008", "url": "https://www.linkedin.com/posts/alexseiler_when-you-have-a-good-week-you-should-scream-activity-7469406990025515008-r5LB", "kind": "post", "date": "2026-06-07T15:16:41.293000+00:00", "reactions": 118, "comments": 5, "engagement": 123, "text": "when you have a good week, you should scream it from the rooftop well, I’m doing that (from the comfort of a plane seat, but you get the point). heading back to Portland and thankful for so many highlights this week: -spending quality 1:1 in person time with Tracie Sponenberg and her family (felt very parasocial- “I know you but I don’t know you” and standing in her home office instead of looking at it on Zoom. -an awesome DisruptHR - Manchester, NH-that I got to co-emcee with Tracie and Ryan Rourke - it wouldn’t have happened without you and would do an event with you again any day. the crowd was awesome and the speakers just bought it! (old friends, like Angela Cheng-Cimini 鄭婷婷 and new alike). -a fortuitously timed trip that allowed Tracie and I to attend a Transform Boston chapter dinner with Samara Jaffe. -an awesome new coaching client that found me on Intro: book time if you have a need (or someone you know does). -a catch up with Phil Strazzulla, grabbing a protein smoothie and getting some Vitamin D in sunshine -meeting my new furry friends, Luke and Leo 🐕🐕- don’t tell Reilly Noodles 🐈 I cheated on him for a few days -time spent with old friends in Boston that I haven’t seen in a few years, celebrating Pride together (looking at you Fredrik Tingdal and Francisco) -a happy unexpected run in with my friend Maggie (Margaret) Ruvoldt at the United Club.", "hook": "when you have a good week, you should scream it from the rooftop well, I’m doing that (from the comfort of a plane seat, but you get the poi…", "ratio": 1.58, "band": "baseline", "name": "Alex Seiler"}, {"id": "7467946917818331136", "url": "https://www.linkedin.com/posts/alexseiler_today-is-the-day-excited-to-take-the-stage-activity-7467946917818331136-iQkT", "kind": "post", "date": "2026-06-03T14:34:52.952000+00:00", "reactions": 102, "comments": 18, "engagement": 120, "text": "Today is the day! Excited to take the stage with Tracie Sponenberg and Ryan Rourke at DisruptHR - Manchester, NH as we listen and learn from our impressive roster of speakers: Angela Cheng-Cimini 鄭婷婷 Pasha Marlowe, MFT Michelle Strasburger Keisha O'Marde-Jack, PHR, SHRM-CP Rebecca Conners Bruce Nichols Hema Crockett Laura Tomaino Jillian Granucci Anderson Alexis Davis, PHR, sHRBP Kelly Casey Risa Taylor Caroline Fleming, sHRBP, SHRM-CP, MBA Janelle Gorman Brooke Neva Sullivan Shelly Masson Dirk Beveridge If you're already coming, see you there! If you see this and think, I need to be there, link to buy tickets in the Comments (still a few hours left)!", "hook": "Today is the day!", "ratio": 1.54, "band": "baseline", "name": "Alex Seiler"}, {"id": "7467266102419542017", "url": "https://www.linkedin.com/posts/alexseiler_lots-to-be-excited-about-this-week-i-activity-7467266102419542017-bwkQ", "kind": "post", "date": "2026-06-01T17:29:33.912000+00:00", "reactions": 179, "comments": 29, "engagement": 208, "text": "Lots to be excited about this week. 🌈 I’m heading to Boston and New Hampshire, and honestly? The week ahead is is giving me all the feels. Here’s what’s on deck: In-person time with my BFF Tracie Sponenberg Sponenberg — on the DisruptHR NH stage and before and after. (Plus meeting some of her family for the first time. Big deal.) Getting to finally meet Ryan Rourke and thank him properly for making DisruptHR NH happen. He also gets credit for indulging my walk-on music opinions. Watching some genuinely great speakers do their thing — a couple I already know and love, and others I’m excited to get to know better. Celebrating getting my client through Go-Live on their first global HRIS and payroll system. Six countries. Nearly 300 employees. We did that. 🎉 Catching up with people like Samara Jaffe and Amy Spurling. If you’re in the area and free — find me. And closing out the week celebrating Pride in Boston with friends. Because as RuPaul says: “it is an act of defiance to have joy”. We need to hold onto that. Especially right now. Especially as we head into Pride month. Happy June. Go be joyful. Defiantly.", "hook": "Lots to be excited about this week.", "ratio": 2.67, "band": "working", "name": "Alex Seiler"}, {"id": "7466213403892633600", "url": "https://www.linkedin.com/posts/alexseiler_time-for-a-little-crowd-sourcing-help-im-activity-7466213403892633600-Y3EL", "kind": "post", "date": "2026-05-29T19:46:31.025000+00:00", "reactions": 36, "comments": 40, "engagement": 76, "text": "time for a little crowd-sourcing help: I'm co-emceeing DisruptHR NH next week and I need walk-on (dance on) music and torn is an understatement. The current short list includes: -Can't Stop That Feeling: Justin Timberlake -Work It: Missy Elliott -Simply the Best: Tina Turner -Unstoppable: Sia -9 to 5: Dolly Parton (irony much?) -About Damn Time: Lizzo -This is How We Do It: Montell Jordan (thanks Hebba Youssef) Thoughts and/or additions?", "hook": "time for a little crowd-sourcing help: I'm co-emceeing DisruptHR NH next week and I need walk-on (dance on) music and torn is an understatem…", "ratio": 0.97, "band": "baseline", "name": "Alex Seiler"}, {"id": "7465099004905787392", "url": "https://www.linkedin.com/posts/alexseiler_the-fractional-life-is-rewarding-its-also-activity-7465099004905787392-NZOT", "kind": "post", "date": "2026-05-26T17:58:17.602000+00:00", "reactions": 49, "comments": 5, "engagement": 54, "text": "The fractional life is rewarding. It's also isolating, uncertain, and relentless in ways most people don't talk about. Tracie Sponenberg and I want to change that. This Thursday, the Transform Fractional People's Network is hosting a Mental Health Meetup — and it's not a webinar. No panels. No experts telling you how to feel. Just real people having real conversations about what this life actually looks like. Because sometimes you're building the plane while flying it — alone, without a team, without anyone checking in. We're creating space for that. Thursday, May 28 | 9am PST / 12pm EST | Virtual If you're fractional and have ever felt the weight of this journey (or fractionally curious) — this is for you. Registration link is in the Comments. We see you. Come talk to us.", "hook": "The fractional life is rewarding.", "ratio": 0.69, "band": "baseline", "name": "Alex Seiler"}, {"id": "7463282704768442368", "url": "https://www.linkedin.com/posts/alexseiler_ok-ive-decided-to-weigh-in-on-this-activity-7463282704768442368-_fS6", "kind": "post", "date": "2026-05-21T17:40:57.904000+00:00", "reactions": 1324, "comments": 177, "engagement": 1501, "text": "Ok, I've decided to weigh in on this... Ryan Breslow fired his entire HR team because they were \"creating problems that didn't exist.\" Then those problems disappeared. Cool story. Here's what actually happened: Bolt's valuation dropped 97% — from $11 billion to $300 million. Breslow came back, gutted 30% of the workforce, eliminated the people function, and called it \"wartime leadership.\" He acknowledged poor decision-making and overspending caused the collapse. Fair enough. But somehow the HR team still ended up as the villain. HR didn't create the entitlement culture he described. They were navigating it. Naming it. That's not bureaucracy. That's the job. The real tell? He replaced HR with \"People Ops\" — a smaller team doing training and employee support. Which is... HR. Just with fewer people and less protection for employees. CEOs who eliminate HR don't actually want fewer problems. They want fewer witnesses.", "hook": "Ok, I've decided to weigh in on this...", "ratio": 19.24, "band": "breakout", "name": "Alex Seiler"}, {"id": "7462961356368056320", "url": "https://www.linkedin.com/posts/alexseiler_25-hr-leaders-recruiters-people-experts-activity-7462961356368056320-ixPN", "kind": "post", "date": "2026-05-20T20:24:02.475000+00:00", "reactions": 35, "comments": 17, "engagement": 52, "text": "On International HR Day, I'm thankful to Guusto for including me on this list, alongside people I respect and in many cases, I get to call friends, all of whom are challenging and changing the future of work at such a critical time and juncture. Tracie Sponenberg, Hebba Youssef, Sarika Lamont, Ashley Herd, Lia Seth, PHR 💫, Joey Price, Leigh Elena Henderson, Jamie Jackson, Noah Mithrush, JD Dillon, Stacey Nordwall, Hayley Shelton, MRLS, MAORGL, PHR, Michelle Strasburger, daniela (dani) herrera, Katrina Kibben, Rachel Cupples, JESS VON BANK, Elles Skony, Laura Lillie Goodridge, Sam Garven, Matt McFarlane, Sheila ☕ Krueger (she/her/ella), MBA, CCP, Vanesa Cotlar, MBA, Fay Wallis Check out the list in more detail below:", "hook": "On International HR Day, I'm thankful to Guusto for including me on this list, alongside people I respect and in many cases, I get to call f…", "ratio": 0.67, "band": "baseline", "name": "Alex Seiler"}, {"id": "7462539701657182210", "url": "https://www.linkedin.com/posts/alexseiler_last-week-was-a-lot-getting-my-la-condo-activity-7462539701657182210-Ly2k", "kind": "post", "date": "2026-05-19T16:28:32.158000+00:00", "reactions": 70, "comments": 8, "engagement": 78, "text": "Last week was a lot. Getting my LA condo ready for renters. Making sure clients didn't feel the chaos. A sick Reilly Noodles. A flight to Portland. The kind of week where you're running on fumes and willpower. But I kept coming back to one thing: this is right around the corner. I've followed DisruptHR from afar for years. Loved the format — 5 minutes, one idea, no filler. Years ago DisruptHR NYC even came calling. I missed my window. So when Tracie Sponenberg asked me to co-emcee DisruptHR Manchester NH alongside her? I'll take the redemption arc. This one means something. Tracie and Ryan Rourke have done the real work to bring this back to NH after a long hiatus. I get to show up and be on stage with my BFF. I'll take that deal. Here's what you're signing up for: 5-minute talks. No fluff. No 45-slide decks. Just practitioners who have something real to say about work, people, and where HR is actually going — designed to challenge the way you think. A few details worth knowing: 📅 Wednesday, June 3rd 📍 The Venues at The Factory | Manchester, NH 🎟️ Tickets are $25 — and 100% of proceeds are donated ☕ Espresso Dave on coffee 🍕 Deadproof Pizza on food 🍹 Vintage Cocktails on drinks We haven't done much promotion yet and less than half the tickets are left. If you've been on the fence, now's the time. Speakers and sponsors dropping soon. Stay tuned. 🎟️ Tickets: https://lnkd.in/ePABx6z", "hook": "Last week was a lot.", "ratio": 1.0, "band": "baseline", "name": "Alex Seiler"}, {"id": "7454504030157819905", "url": "https://www.linkedin.com/posts/amymencarelli_activity-7454504030157819905-ei5D", "kind": "post", "date": "2026-04-27T12:17:38.777000+00:00", "reactions": 0, "comments": 0, "engagement": 0, "text": "", "hook": "", "ratio": null, "band": "n/a", "name": "Amy Mencarelli"}, {"id": "7469713592599199744", "url": "https://www.linkedin.com/posts/beneubanks_breaking-up-your-training-into-short-social-activity-7469713592599199744-6ms3", "kind": "post", "date": "2026-06-08T11:35:01.043000+00:00", "reactions": 13, "comments": 7, "engagement": 20, "text": "Breaking up your training into short, social media-like videos? New research says that might not be an effective strategy. A big trend in learning content over the last decade has been \"chunkable\" or \"bite sized\" videos. But there's a limit to that, as new evidence shows. \"Researchers at Yunnan Normal University and Central China Normal University recently set out to assess the potential of short videos and longer videos as learning resources. Their findings, published in Communications Psychology, suggest that short videos are significantly less effective learning tools than longer videos, as people tend to rapidly forget the information presented in them.\" \"Across three experiments, memory performance and forgetting rate were assessed under both incidental and intentional encoding conditions, and inter-subject correlation (ISC) analysis was employed to investigate neural response patterns during short video viewing,\" wrote the authors. \"Behaviorally, participants learning with short videos showed significantly lower immediate memory accuracy across encoding conditions and exhibited a higher rate of forgetting when explicitly instructed to remember.\" This type of short form video is hard for the brain to process because it breaks up attention and memory storage. Takeaway: the shorter the content gets (experiment tested content as short as 90 seconds) the less likely viewers (learners!) will be able to learn, process, and remember the content. Source: phys .org", "hook": "Breaking up your training into short, social media-like videos?", "ratio": 0.71, "band": "baseline", "name": "Ben Eubanks"}, {"id": "7468781871099965440", "url": "https://www.linkedin.com/posts/beneubanks_adobelearningsummit-learningstrategy-activity-7468781871099965440-5j2L", "kind": "post", "date": "2026-06-05T21:52:41.327000+00:00", "reactions": 25, "comments": 3, "engagement": 28, "text": "Two years ago I stood on the stage at Adobe Learning Summit and told a group of learning leaders exactly what their learners were thinking. We explored topics like: ---> Their preferred sources of learning content (hint: not the LMS!) ---> The two crucial elements for a strong learning culture (opportunity + autonomy is the secret sauce) ---> How someone's generation/life stage affects their preferred source of learning content This June I'll be back again to share updated research on these topics! We're analyzing the data now and the findings are fascinating. AI is changing WHAT people learn, HOW people learn, and WHY people learn. But there are other important changes that we can't miss, too. If you're trying to create a learning environment and culture where your people can win, this is a session you're going to want to see. Come join me on June 24th and 25th in Las Vegas and let's spend time with leaders who are building, testing, and rethinking what learning looks like inside their organizations today. Sign up for Adobe Learning Summit here: https://lnkd.in/diKS5svz #AdobeLearningSummit #LearningStrategy Adobe Learning Manager", "hook": "Two years ago I stood on the stage at Adobe Learning Summit and told a group of learning leaders exactly what their learners were thinking.", "ratio": 1.0, "band": "baseline", "name": "Ben Eubanks"}, {"id": "7468660540991602688", "url": "https://www.linkedin.com/posts/beneubanks_hrsummerschool-activity-7468660540991602688-f6PH", "kind": "post", "date": "2026-06-05T13:50:33.975000+00:00", "reactions": 63, "comments": 3, "engagement": 66, "text": "This sums up my week of name tags at HR Summer School over the last few days. So many feelings. #hrsummerschool HR Summer School", "hook": "This sums up my week of name tags at HR Summer School over the last few days.", "ratio": 2.36, "band": "working", "name": "Ben Eubanks"}, {"id": "7468339849910091777", "url": "https://www.linkedin.com/posts/beneubanks_were-about-90-minutes-into-an-amazing-hrss-activity-7468339849910091777-ZjtD", "kind": "post", "date": "2026-06-04T16:36:15.263000+00:00", "reactions": 3, "comments": 0, "engagement": 3, "text": "We're about 90 minutes into an amazing HRSS 2026. One hour left to go! Jump in! https://lnkd.in/eFxfYihW | Ben Eubanks", "hook": "We're about 90 minutes into an amazing HRSS 2026.", "ratio": 0.11, "band": "baseline", "name": "Ben Eubanks"}, {"id": "7468265743848062976", "url": "https://www.linkedin.com/posts/beneubanks_employeeexperience-employeeretention-activity-7468265743848062976-JnHs", "kind": "post", "date": "2026-06-04T11:41:47.001000+00:00", "reactions": 10, "comments": 1, "engagement": 11, "text": "Today, our research shows that 40% of workers are either planning to quit or uncertain about their future with their employer. And the research tells us the danger isn't just that people might leave. It's that they check out mentally long before they ever hand in a resignation. Next week I'll be joining the team at Insperity for the second half of our webinar series on #employeeexperience. Specifically we're looking at #employeeretention and how managers play a role in winning (or losing) that battle. I'm excited to learn from our all-star panel! Ashley Bonilla with insights on how we hire, screen, and onboard great people Dana St. Pierre-Cabrera, a people leader who intentionally creates environments to listen, recognize, develop, and support the workforce Michael Zeglinski who will share from the CEO perspective about making culture and values REAL and tangible, not just a poster on the wall This has been such a fun set of events with the Insperity team and the audience loved the last one. Want to join? Here's the link to sign up: https://lnkd.in/gQDZTwei Dianne Chatterton, MS", "hook": "Today, our research shows that 40% of workers are either planning to quit or uncertain about their future with their employer.", "ratio": 0.39, "band": "baseline", "name": "Ben Eubanks"}, {"id": "7467528914370752513", "url": "https://www.linkedin.com/posts/beneubanks_hrsummerschool-activity-7467528914370752513-i9kF", "kind": "post", "date": "2026-06-02T10:53:53.164000+00:00", "reactions": 102, "comments": 12, "engagement": 114, "text": "Nashville here we come! HR Summer School goes live at 10a central today. Can't wait to meet our studio audience and fantastic speakers for Day one. Catch us virtually or we still have a few tickets in person if you want to join today (Jill Plantz can help!) #HRSummerSchool", "hook": "Nashville here we come!", "ratio": 4.07, "band": "working", "name": "Ben Eubanks"}, {"id": "7466269271854174209", "url": "https://www.linkedin.com/posts/beneubanks_hrsummerschool-activity-7466269271854174209-TzdJ", "kind": "post", "date": "2026-05-29T23:28:30.985000+00:00", "reactions": 53, "comments": 14, "engagement": 67, "text": "\"We're in a time where the value of humanity has never been higher.\" Jim Morgan Today we wrapped up our last recordings for HR Summer School. Next week we go live Tuesday through Thursday. So many amazing conversations coming. Allyson Smart, SPHR Kamaria Scott Angela N. Briggs-Paige, CMBA, SPHR, CDR Lance Sapera Zech Dahms, MBA Shane Noe Mike Bollinger Tyrese Manigault Christine Beldner, MSHRM, SPHR, SHRM-SCP Kenneth Matos Emma Belconis Jack Hooper Amy Mosher Abhijit Bhaduri Each of these people is hand picked for what they bring to the conversation, and there's so much good stuff ahead! George Rogers and I spend months planning this and we're excited to see everyone in the community come together and celebrate the humans that make work happen Want to join us? HRSummerSchool is easy to find. 😉 It's free. 7.5 HRCI/SHRM credits. A prize closet chock full of goodies to give away! Most importantly, a community that celebrates the successes of everyone, because we're in this together. 🫂 Plus we will give away this year's Unity award to someone who is going above and beyond to support, lift others up, and contribute to the community in a meaningful way. Grateful to Employ Cornerstone OnDemand isolved Take Command HiBob Verified First for supporting this event and making a positive impact on the #hrsummerschool family. ♥️", "hook": "\"We're in a time where the value of humanity has never been higher.\" Jim Morgan Today we wrapped up our last recordings for HR Summer School…", "ratio": 2.39, "band": "working", "name": "Ben Eubanks"}, {"id": "7470187681159901185", "url": "https://www.linkedin.com/posts/cammasfreeman_a-little-mid-afternoon-walk-around-the-park-activity-7470187681159901185-Jtf7", "kind": "post", "date": "2026-06-09T18:58:52.564000+00:00", "reactions": 80, "comments": 8, "engagement": 88, "text": "A little mid afternoon walk around the park in my weighted vest is good for the soul...and my neck. 🚶🏻♀️ I feel like it looks a little aggressive and I'm not really sure it works, but they say it increases your caloric burn 10-15%...!? We'll see! I do like it because when I'm in a heads down recruiting mode I have to get up and move around for a 20 minute walk, it's like I'm doing a 23 minute walk. Hey, 3 minute efficiency counts! 😀 Not only am I recruiting for the Dallas roles, I'm preparing to announce the Save the Date for DisruptHR Boise! Yay! Stay tuned for the announcement tomorrow and early bird tickets 🤩 And remember to take a mid-day break! ❤️", "hook": "A little mid afternoon walk around the park in my weighted vest is good for the soul...and my neck.", "ratio": 1.19, "band": "baseline", "name": "Cammas Freeman"}, {"id": "7469830401759535105", "url": "https://www.linkedin.com/posts/cammasfreeman_manufacturingleadership-fortworthjobs-activity-7469830401759535105-PgqP", "kind": "post", "date": "2026-06-08T19:19:10.517000+00:00", "reactions": 27, "comments": 2, "engagement": 29, "text": "The weather is cooler in Boise right now but recruiting in construction and manufacturing is HOT 🔥! Stackrock Talent has five roles open right now (more to come!) across manufacturing and commercial construction, and we're moving fast on all of them. Here are the roles we have currently ⬇️ HEAD OF OPERATIONS - Builder, lead and scale Aerospace Manufacturing | 📍Dallas, TX PROJECT MANAGER - Keep builds on schedule Commercial Construction | 📍Boise, ID SUPERINTENDENT - Run the field Commercial Construction | 📍Boise, ID SR. PM/ESTIMATOR PLUMBING Commercial Construction | 📍Boise, ID HVAC INSTALLERS/LEAD - Journeyman or provisional Commercial Construction | 📍Boise, ID Coming soon ⬇️ Aerospace Manufacturing | Dallas, TX > Head of Sales > Head of Projects > Quality Control Manager > Project/Program Manager See one that fits you or know someone you'd vouch for? Reach out to me or Laura Waite - we'd love to chat! #ManufacturingLeadership #FortWorthJobs #CommercialConstruction #BoiseJobs", "hook": "The weather is cooler in Boise right now but recruiting in construction and manufacturing is HOT 🔥!", "ratio": 0.39, "band": "baseline", "name": "Cammas Freeman"}, {"id": "7468285506556989440", "url": "https://www.linkedin.com/posts/cammasfreeman_texas-manufacturing-hiring-activity-7468285506556989440-h-EI", "kind": "post", "date": "2026-06-04T13:00:18.798000+00:00", "reactions": 62, "comments": 12, "engagement": 74, "text": "Just back from Fort Worth after spending time onsite with our client, and I’m reminded how valuable it is to be with the people you’re supporting. There’s something different about seeing the operation in motion, meeting the team, and better understanding the challenges they’re hiring for. Recruiting is not just about filling a role. It’s about understanding the business, the culture, the pace, the expectations, and the people who make it all work. I’m grateful for clients who welcome that level of partnership and trust us to be part of the solution. I'm excited to work with such an outstanding leadership team and for what's ahead in Texas! 💙 🤍 ❤️ #Texas #Manufacturing #Hiring Stackrock Talent", "hook": "Just back from Fort Worth after spending time onsite with our client, and I’m reminded how valuable it is to be with the people you’re suppo…", "ratio": 1.0, "band": "baseline", "name": "Cammas Freeman"}, {"id": "7467643648289972225", "url": "https://www.linkedin.com/posts/cammasfreeman_dfw-aerospace-manufacturing-activity-7467643648289972225-ETpx", "kind": "post", "date": "2026-06-02T18:29:47.862000+00:00", "reactions": 36, "comments": 1, "engagement": 37, "text": "I am happy to be spending the afternoon working in downtown Fort Worth near Sundance Square - what a cool area! While it's a tad warmer 🥵 than Idaho right now, it's beautiful! They say everything is bigger in Texas, the aerospace industry is no exception. 🚀 Texas is a powerhouse for manufacturing aircraft, spacecraft, defense systems, and precision parts, ranking # 3 in the nation for aerospace product and part manufacturing firms. 🚀 18 of the world's 20 largest aerospace manufacturers have operations here. 🚀 Texas is ranked # 1 in the country for aerospace manufacturing attractiveness. Excited to roll up my sleeves, let's gooooo 💪🏻 🚀 🛫 #DFW #Aerospace #Manufacturing", "hook": "I am happy to be spending the afternoon working in downtown Fort Worth near Sundance Square - what a cool area!", "ratio": 0.5, "band": "baseline", "name": "Cammas Freeman"}, {"id": "7466947564278562816", "url": "https://www.linkedin.com/posts/cammasfreeman_one-of-the-best-things-i-implemented-a-few-activity-7466947564278562816-xx8a", "kind": "post", "date": "2026-05-31T20:23:48.501000+00:00", "reactions": 45, "comments": 5, "engagement": 50, "text": "One of the best things I implemented a few years back was Sunday prep. Even if its only for 30 minutes, its well worth it to effectively prepare for the week. I know the times haven't done that, my Monday mornings are more hectic. Today is one of those days where I got all my personal and house chores done yesterday so I could spend a few hours today working. And, of course outside is my favorite place to work and take advantage of it as much as I can while the weather is so nice - 68 degrees and sunny! ☀️ One of my favorite spots to work is at Indian Creek Plaza in downtown Caldwell, Idaho. If you haven't been, I highly recommend! This will be a busy week with travel to a client site so I'm thankful to have this time to both chill and prepare for a successful week. Hope everyone is having an amazing Sunday! 🤩", "hook": "One of the best things I implemented a few years back was Sunday prep.", "ratio": 0.68, "band": "baseline", "name": "Cammas Freeman"}, {"id": "7466258951366483968", "url": "https://www.linkedin.com/posts/cammasfreeman_texas-manufacturing-jobs-activity-7466258951366483968-Bef1", "kind": "post", "date": "2026-05-29T22:47:30.389000+00:00", "reactions": 146, "comments": 19, "engagement": 165, "text": "Its an extra-special Friday when you high five🫸 🫷yourself because your so excited to partner with a growth-mode aerospace manufacturing company! I can't even say enough good things about this team - the leadership, the communication, and they're good humans...these are the companies I love to help grow! Stackrock Talent will be hiring their core leadership team in Dallas-Fort Worth so stay tuned if you want to be part of something amazing! 🤩 Here's some of the initial areas we will be hiring in: Operations Sales Project Management Quality I'm headed to DFW to meet the team next week, see you soon Texas! ❤️ 🤍 💙 #Texas #Manufacturing #Jobs", "hook": "Its an extra-special Friday when you high five🫸 🫷yourself because your so excited to partner with a growth-mode aerospace manufacturing comp…", "ratio": 2.23, "band": "working", "name": "Cammas Freeman"}, {"id": "7465763894121189376", "url": "https://www.linkedin.com/posts/cammasfreeman_its-just-a-backpack-its-also-the-backpack-activity-7465763894121189376-iszW", "kind": "post", "date": "2026-05-28T14:00:19.544000+00:00", "reactions": 98, "comments": 19, "engagement": 117, "text": "It’s just a backpack. It’s also the backpack I got after I was promoted into my dream job. It was the backpack I had when I got laid off from that dream job. It was the backpack that I carried around while getting up the courage to start my own business. It’s the backpack that I took to every coffee shop, networking event, potential client meeting for the last 7 years. It sat next to me at home when I was working late at the kitchen table. It’s traveled all over the country with me carrying my laptop safely. I got a lot of compliments from strangers about that backpack. It was there through the good, the bad, the sad and everything in between. I didn’t think I’d ever be attached to a backpack, but here I am. And, now I have a new backpack. It’s functional, cute-ish, and my first time using it I got a compliment! Since I’ve had this new backpack, I’ve successfully delivered another DisruptHR Knoxville and gained two new amazing clients for Stackrock Talent. 🥂 Cheers and thanks to the old grey, dirty backpack. 🙌 Let’s do this new beige (soon-to-be-dirty) backpack - new goals, new wins, new memories.", "hook": "It’s just a backpack.", "ratio": 1.58, "band": "baseline", "name": "Cammas Freeman"}, {"id": "7465460695862751233", "url": "https://www.linkedin.com/posts/cammasfreeman_boise-jobs-construction-activity-7465460695862751233-uhdQ", "kind": "post", "date": "2026-05-27T17:55:31.446000+00:00", "reactions": 24, "comments": 2, "engagement": 26, "text": "We've recently placed FOUR commercial construction professionals with our clients and guess what? We have MORE roles to hire for! I mean, let's hear it for construction in Idaho - it's busy! 👏 Here are TWO more roles Stackrock Talent is hiring for. Both companies are fantastic and we'd love to connect them to equally fantastic people! 👷 PROJECT MANAGER - Commercial General Contractor 👷 PLUMBING PROJECT MANAGER - Commercial Mechanical Contractor 📩 Reach out to Laura Waite for more info. Link to job details in comments ⬇️ Let's goooooo Idaho! 💪 Interested? Know someone? Appreciate the share! #Boise #Jobs #Construction", "hook": "We've recently placed FOUR commercial construction professionals with our clients and guess what?", "ratio": 0.35, "band": "baseline", "name": "Cammas Freeman"}, {"id": "7462551060159758336", "url": "https://www.linkedin.com/posts/cammasfreeman_disrupthr-knoxville-morning-run-throughcheck-activity-7462551060159758336-wTA0", "kind": "post", "date": "2026-05-19T17:13:40.236000+00:00", "reactions": 74, "comments": 1, "engagement": 75, "text": "DisruptHR Knoxville morning run through…check! They were soooo good…see you tonight! 🤩 | Cammas Freeman", "hook": "DisruptHR Knoxville morning run through…check!", "ratio": 1.01, "band": "baseline", "name": "Cammas Freeman"}, {"id": "7471683003325530113", "url": "https://www.linkedin.com/posts/charlywargnier_computer-vision-is-shifting-from-static-activity-7471683003325530113-7tk9", "kind": "post", "date": "2026-06-13T22:00:45.150000+00:00", "reactions": 42, "comments": 1, "engagement": 43, "text": "🚨 Computer vision is shifting from static scans to agentic behavior. Perceptron AI just released `Agentic Detection`, a new API that localizes objects simply from a description or even a crop 🔥 Standard one-shot detectors do a single pass and miss critical details. Perceptron fixes this with an agentic harness that takes control of the image. The Mk1 model autonomously zooms, crops, and tiles, issuing multiple calls per request to catch tiny objects others miss. You can use the API in 3 ways: → Detect everything: an exhaustive zero-label inventory → Open-vocab: Find anything via text prompts → Visual exemplars: Find items matching a single visual crop It handles satellite imagery, robot sensors, LiDAR, and more. At $0.15/M input and $1.50/M output, the pricing is highly disruptive. Check out these 5 WILD demos below ↓ #1 First use case: the rock climbing gym. → https://lnkd.in/eaXGkT6D This is dense detection at its finest. The model flawlessly identifies thousands of overlapping climbing holds, proving it stays highly accurate in chaotic visual environments. __________ #2 Next up: Utility Infrastructure. → https://lnkd.in/eCbwtscD Electrical pylons are visually messy, with overlapping cables and small components. Perceptron still identifies the key points zero-shot! __________ #3 This third demo uses a hidden-object image from the FindTheSniper community on Reddit. → https://lnkd.in/ebuVm9WH The snake is camouflaged so well that humans need minutes to find it. Perceptron spots the fine details almost instantly. __________ #4 Now let’s look at geospatial density. → https://lnkd.in/e_yEaadz The sheer number of detections here is staggering. General purpose VLMs usually fail here, but using in-context learning, Perceptron ensures powerful detection regardless of image density. __________ #5 Last one's about LiDAR! → https://lnkd.in/eMfMKhg6 LiDAR maps the world using laser distance points, making it a harder test than natural images. Perceptron adapts and reads the scene anyway 💥 __________ - Their API is live now. - Try the interactive demos → https://lnkd.in/ev8gWh8u - Check out Perceptron AI's website → https://lnkd.in/eGaFgCfU - You can view the full thread with all the demos on 𝕏 → https://lnkd.in/eU4aNx4C If you got value from this, a like or repost really helps spread the word 👊 Follow me here or on 𝕏 → @datachaz to keep up with the latest in LLMs and AI agents", "hook": "🚨 Computer vision is shifting from static scans to agentic behavior.", "ratio": 1.65, "band": "baseline", "name": "Charly Wargnier"}, {"id": "7471677897670393856", "url": "https://www.linkedin.com/posts/charlywargnier_ace-advice-from-fable-5-just-before-it-got-activity-7471677897670393856-x1uh", "kind": "post", "date": "2026-06-13T21:40:27.867000+00:00", "reactions": 32, "comments": 2, "engagement": 34, "text": "Ace advice from Fable 5, just before it got banned 🥹 | Charly Wargnier", "hook": "Ace advice from Fable 5, just before it got banned 🥹 | Charly Wargnier", "ratio": 1.31, "band": "baseline", "name": "Charly Wargnier"}, {"id": "7471671740717318144", "url": "https://www.linkedin.com/posts/charlywargnier_activity-7471671740717318144-KtyL", "kind": "post", "date": "2026-06-13T21:15:59.935000+00:00", "reactions": 26, "comments": 2, "engagement": 28, "text": "", "hook": "", "ratio": 1.08, "band": "baseline", "name": "Charly Wargnier"}, {"id": "7471643177393897472", "url": "https://www.linkedin.com/posts/charlywargnier_its-absolutely-insane-what-you-can-could-activity-7471643177393897472-uk6Z", "kind": "post", "date": "2026-06-13T19:22:29.908000+00:00", "reactions": 23, "comments": 3, "engagement": 26, "text": "It's ABSOLUTELY INSANE what you c̶a̶n̶ could do with Claude Fable 5. Fable made this entire video by itself 🤯 Nate Herk only gave it a /goal prompt, went to the gym, and came back to this ↓ | Charly Wargnier", "hook": "It's ABSOLUTELY INSANE what you c̶a̶n̶ could do with Claude Fable 5.", "ratio": 1.0, "band": "baseline", "name": "Charly Wargnier"}, {"id": "7471636292423012353", "url": "https://www.linkedin.com/posts/charlywargnier_we-all-know-speech-to-text-models-look-activity-7471636292423012353-KQme", "kind": "post", "date": "2026-06-13T18:55:08.403000+00:00", "reactions": 17, "comments": 0, "engagement": 17, "text": "🚨 We all know speech-to-text models look great on clean lab benchmarks. But what happens when they hit real customer calls? Add in some background noise, thick accents, or overlapping speakers, and the output quickly becomes unusable. This is the exact problem Gladia set out to solve with SOLARIA-3 🔥 It’s a brand-new ASR model engineered specifically for the messy, unpredictable audio that businesses actually deal with in production. While SOLARIA-1 is still Gladia's go-to for 100+ languages and live streaming, SOLARIA-3 serves as a highly precise tool for core European languages. The benchmark results dropped this week, and they are wild: → 9.6% WER on real English customer calls (#1 in the field) → 6.4% WER on the Earnings22 business dataset (#1) → 33.9% WER on conversational telephone speech (#1) When you’re building voice agents, meeting assistants, or contact center AI, transcription accuracy dictates your success. I’ve seen a few demos from the Gladia team, and the accuracy is incredible. SOLARIA-3 flawlessly caught tricky names, complex numbers, and niche industry jargon that usually breaks other models. Better transcripts mean massive improvements in downstream LLM performance. It means building voice workflows you can actually trust. I still need to run my own heavy stress tests, but Solaria-3 is already looking like a massive leap forward for Audio-to-LLM pipelines 👀 ___________ Want to throw your messiest audio files at it? Test Solaria-3 here → https://lnkd.in/ekQpyGAu Big thanks to Gladia for collaborating on this post 🙌 Also you can use promo code * TRY-SOLARIA-3 * to grab $200 worth of free async transcription hours!", "hook": "🚨 We all know speech-to-text models look great on clean lab benchmarks.", "ratio": 0.65, "band": "baseline", "name": "Charly Wargnier"}, {"id": "7471513242260119552", "url": "https://www.linkedin.com/posts/charlywargnier_andrej-karpathy-predicted-the-power-of-activity-7471513242260119552-jiVy", "kind": "post", "date": "2026-06-13T10:46:10.958000+00:00", "reactions": 7, "comments": 0, "engagement": 7, "text": "🚨 Andrej Karpathy predicted the power of the \"LLM Wiki\" Google just formalized it. Meet Open Knowledge Format (OKF): a vendor-neutral standard for giving foundation models the curated context they need. I can genuinely see this replacing Notion, Obsidian, or traditional wikis for developer teams, and the reason comes down to bookkeeping. Traditional wikis fail because humans inevitably abandon the tedious work of updating them. As Andrej Karpathy pointed out recently, LLMs don't get bored. They don't forget to update a cross-reference, and they can touch 15 files in a single pass. OKF standardizes the interoperability layer so agents can actually do that heavy lifting autonomously. Because the format is minimally opinionated, it doesn't dictate what you write, it just dictates how it's structured. You get: → Human-readable documents that live right alongside your code in version control → Cross-links that map out complex entity relationships without needing a graph database → A system that survives moving between different tools and organizations There is no complex compression scheme. No central registry. If you can cat a file, you can read it. If you can git clone a repo, you can deploy it. This is how we stop rebuilding context pipelines from scratch every time a new model drops. Google's blog post: https://lnkd.in/ePECS3zS Spec file here: https://lnkd.in/eZcZ_4Km", "hook": "🚨 Andrej Karpathy predicted the power of the \"LLM Wiki\" Google just formalized it.", "ratio": 0.27, "band": "baseline", "name": "Charly Wargnier"}, {"id": "7471507906962726912", "url": "https://www.linkedin.com/posts/charlywargnier_unprecedented-move-the-us-government-activity-7471507906962726912-5jdg", "kind": "post", "date": "2026-06-13T10:24:58.924000+00:00", "reactions": 6, "comments": 2, "engagement": 8, "text": "🚨 UNPRECEDENTED MOVE: The US government just forced Anthropic to pull Fable 5 and Mythos 5 offline globally over \"national security\" concerns. The wildest part is Anthropic's rebuttal. They claim the government's alleged \"jailbreak\" is basically just asking the model to review code for bugs, something widely available in GPT-5.5 and used daily by security defenders. Anthropic is warning the industry: if this becomes the new regulatory standard, it will halt all new frontier models from being deployed. If you're building on Fable, reroute your API to Opus 4.8 immediately. Full announcement: https://lnkd.in/eZ_Grk-M", "hook": "🚨 UNPRECEDENTED MOVE: The US government just forced Anthropic to pull Fable 5 and Mythos 5 offline globally over \"national security\" concern…", "ratio": 0.31, "band": "baseline", "name": "Charly Wargnier"}, {"id": "7471502939040337920", "url": "https://www.linkedin.com/posts/charlywargnier_fable-we-had-a-blast-while-it-lasted-activity-7471502939040337920-zZ-9", "kind": "post", "date": "2026-06-13T10:05:14.479000+00:00", "reactions": 12, "comments": 2, "engagement": 14, "text": "Fable, we had a blast while it lasted | Charly Wargnier", "hook": "Fable, we had a blast while it lasted | Charly Wargnier", "ratio": 0.54, "band": "baseline", "name": "Charly Wargnier"}, {"id": "7471500819209785344", "url": "https://www.linkedin.com/posts/charlywargnier_manually-dragging-boxes-for-architecture-activity-7471500819209785344-QqMw", "kind": "post", "date": "2026-06-13T09:56:49.072000+00:00", "reactions": 21, "comments": 0, "engagement": 21, "text": "MANUALLY DRAGGING BOXES FOR ARCHITECTURE DIAGRAMS IS FINALLY DEAD There is a new open-source agent skill that turns raw codebases into cleanly routed draw.io diagrams without you placing a single coordinate. The project, drawio-skill, runs directly inside Claude Code, Cursor, or Copilot. Instead of opening a blank canvas, you just ask your agent to map the repo. Here is what it actually does: → Extracts the module structure (supports Python, JS/TS, Go, Rust) → Uses Graphviz for auto-layout and routing → Drops redundant edges so the graph stays readable → Builds native, editable draw.io files But the standout feature is visual self-checking. Once it generates the diagram, the agent \"looks\" at the resulting PNG. If it sees stacked edges or clipped text, it auto-fixes the layout across up to 5 iterative rounds. It runs from a single file. No MCP server. No background daemon. Best part? It's 100% free and open-source. repo link → https://lnkd.in/e6EbXdQS Don't forget to drop a ⭐️!", "hook": "MANUALLY DRAGGING BOXES FOR ARCHITECTURE DIAGRAMS IS FINALLY DEAD There is a new open-source agent skill that turns raw codebases into clean…", "ratio": 0.81, "band": "baseline", "name": "Charly Wargnier"}, {"id": "7471498659193421825", "url": "https://www.linkedin.com/posts/charlywargnier_nvidia-just-open-sourced-one-of-the-most-activity-7471498659193421825-Q--j", "kind": "post", "date": "2026-06-13T09:48:14.084000+00:00", "reactions": 26, "comments": 3, "engagement": 29, "text": "🚨 NVIDIA JUST OPEN-SOURCED ONE OF THE MOST IMPORTANT AI UTILITIES OF THE YEAR Right now, developers are downloading third-party \"skills\" straight off GitHub for their AI agents. But an AI skill is not just a text prompt. It’s executable code that runs with your system privileges. A skill you grab to save ten minutes can read your environment variables, lift your API keys, and quietly send them to an external server. Recent research shows 26.1% of public skills carry vulnerabilities, and over 5% are outright malicious. NVIDIA’s new release, SkillSpector, closes this gap. It’s an Apache 2.0 licensed security scanner that answers one question: is this skill safe to run? Here is how the pipeline works: → You point it at a GitHub link, local folder, or a single SKILL.md file. → Pass 1: A fast static scan flags credential harvesting, prompt injections, and checks live CVE data. → Pass 2: An optional LLM pass evaluates the semantic intent of the code to clear out false positives. At the end, you get a 0 to 100 risk score and a clear verdict: Safe, Caution, or Do Not Install. It currently scans skills for Claude Code, Codex CLI, and Gemini. Defo worth running before you blindly trust the next agent skill you find online. Link to the repo in the first comment.", "hook": "🚨 NVIDIA JUST OPEN-SOURCED ONE OF THE MOST IMPORTANT AI UTILITIES OF THE YEAR Right now, developers are downloading third-party \"skills\" str…", "ratio": 1.12, "band": "baseline", "name": "Charly Wargnier"}, {"id": "7471462938743173120", "url": "https://www.linkedin.com/posts/charlywargnier_icymi-anthropic-quietly-dropped-9-free-claude-activity-7471462938743173120-c6Vj", "kind": "post", "date": "2026-06-13T07:26:17.665000+00:00", "reactions": 18, "comments": 0, "engagement": 18, "text": "ICYMI, Anthropic quietly dropped 9 FREE Claude Skills tutorials. Covering Projects, Excel workflows, browsing in Chrome, file editing, app integrations, task automation, and more! Zero tech background required, so anyone can learn practical AI free and fast 🧵↓ _______ 1/ First things first, did you know you can create and edit files directly with Claude? Draft documents, iterate on content, and keep everything in one place. ↳ https://lnkd.in/e5hwduCU _______ 2/ Claude can also assist you while you browse in Chrome. Summaries, explanations, and quick insights as you move across pages. ↳ https://lnkd.in/ebPXGPJf _______ 3/ Claude also works directly inside Excel. You can explore datasets, get formula explanations, and reason about numbers without leaving your sheet! ↳ https://lnkd.in/ecp35X86 _______ 4/ You can use Claude in Excel to review revenue models. It helps sanity-check assumptions, logic, and structure in your financial projections. ↳ https://lnkd.in/eHCRBjgn _______ 5/ For HR teams, Claude can also help with headcount planning in Excel. Run scenarios, test growth plans, and make hiring decisions more concrete. ↳ https://lnkd.in/ecWzpSP6 _______ 6/ Organize conversations with Projects so each workflow lives in its own space. Much easier to keep context, files, and long-running tasks clean. ↳ https://lnkd.in/eWStMM23 _______ 7/ Claude’s most capable models (Opus 4.6 and 4.5) are designed for deeper reasoning. Check out how you can make the best of them! ↳ https://lnkd.in/erhUs9yr _______ 8/ Claude can be connected to your other tools too! That opens the door to pulling data from apps and pushing actions back. ↳ https://lnkd.in/euySuAnF _______ 9/ Last but not least, with Claude Cowork, you can automate small recurring tasks. Set up simple workflows and reduce repetitive manual work. ↳ https://lnkd.in/eCP8_jHg _______ Thanks for reading! If you enjoyed this breakdown, a like or repost helps others find it 🦾 Follow me here or on X → @datachaz for the latest on LLMs, AI agents, and data science.", "hook": "ICYMI, Anthropic quietly dropped 9 FREE Claude Skills tutorials.", "ratio": 0.69, "band": "baseline", "name": "Charly Wargnier"}, {"id": "7471178413005811712", "url": "https://www.linkedin.com/posts/charlywargnier_this-hits-hard-activity-7471178413005811712-gOTv", "kind": "post", "date": "2026-06-12T12:35:41.443000+00:00", "reactions": 1297, "comments": 60, "engagement": 1357, "text": "", "hook": "", "ratio": 52.19, "band": "breakout", "name": "Charly Wargnier"}, {"id": "7471177989192564736", "url": "https://www.linkedin.com/posts/charlywargnier_mum-how-did-we-get-so-poor-your-father-activity-7471177989192564736--hgb", "kind": "post", "date": "2026-06-12T12:34:00.398000+00:00", "reactions": 122, "comments": 11, "engagement": 133, "text": "\"Mum, how did we get so poor?\" “Your father subscribed to Claude Max, ChatGPT Pro, Cursor Pro, and still and shipped absolutely f*ck all.”", "hook": "\"Mum, how did we get so poor?\" “Your father subscribed to Claude Max, ChatGPT Pro, Cursor Pro, and still and shipped absolutely f*ck all.”", "ratio": 5.12, "band": "replicable", "name": "Charly Wargnier"}, {"id": "7470904197698375682", "url": "https://www.linkedin.com/posts/danfromhr_if-you-cant-trust-me-you-can-always-trust-activity-7470904197698375682-wp3a", "kind": "post", "date": "2026-06-11T18:26:03.419000+00:00", "reactions": 3, "comments": 0, "engagement": 3, "text": "As someone who spends an unhealthy amount of time on the internet, I get asked for HR resources constantly. Most are a hard pass. This one isn’t. Dan’s HRBP Bootcamp is one of those rare resources that’s actually useful, practical, and created by someone who knows what they’re talking about. So if you’re trying to level up as an HRBP, here’s a recommendation I can make without crossing my fingers behind my back. Link in comments! Daniel Space", "hook": "As someone who spends an unhealthy amount of time on the internet, I get asked for HR resources constantly.", "ratio": 0.18, "band": "baseline", "name": "Daniel Space"}, {"id": "7470460172868661248", "url": "https://www.linkedin.com/posts/danfromhr_yes-ryan-eliminated-hr-the-moment-he-renamed-activity-7470460172868661248-Eb6y", "kind": "post", "date": "2026-06-10T13:01:39.650000+00:00", "reactions": 25, "comments": 1, "engagement": 26, "text": "\"Ryan Breslow didn't eliminate HR he just called it People Operations\" Actually yes he did. The moment he renamed it \"People Operations.\" For two weeks everyone has debated the layoff. Wrong story. Bolt still has people doing HR work. What got eliminated wasn't the department it was the strategic identity of the function. Here's the take I'm holding with both hands: Human Resources is the RIGHT name. We are the resource for the human beings, AND we own the strategies that treat people as what they are to a business — resources. Both things. At once. That's the job. \"Human Capital\" turns people into cattle. \"Personnel\" just administers them. And \"People Operations\"? The moment you put Operations in the title, you've operationalized the function. It stops being a strategic partner and becomes an administrative workflow with a softer brand. Org design. Leadership development. Succession planning. Workforce planning. None of that is \"operations\" — and none of it survives being treated like operations and none of it is going away with AI. Names aren't semantics. Names are scope. Theres a reason we call it \"spell\" - because words have power. The full essay is in today's HRBPS issue Genuine question for my HR folks: does your department say HR or People Ops — and when it changed, did anything actually change with it?", "hook": "\"Ryan Breslow didn't eliminate HR he just called it People Operations\" Actually yes he did.", "ratio": 1.53, "band": "baseline", "name": "Daniel Space"}, {"id": "7469840050713853952", "url": "https://www.linkedin.com/posts/danfromhr_my-mom-visited-me-last-friday-shes-been-activity-7469840050713853952-yvm-", "kind": "post", "date": "2026-06-08T19:57:31.007000+00:00", "reactions": 50, "comments": 13, "engagement": 63, "text": "In the first five real minutes of my day on Friday, in actual daylight consciousness, I lay in bed thinking: I should call Mom. I haven't talked to her in a while. I wonder what she's up to. She has been gone for five years. This is the story of the dream that did that to me... and what I think it meant.", "hook": "In the first five real minutes of my day on Friday, in actual daylight consciousness, I lay in bed thinking: I should call Mom.", "ratio": 3.71, "band": "working", "name": "Daniel Space"}, {"id": "7469774314452652032", "url": "https://www.linkedin.com/posts/danfromhr_this-is-such-a-beautiful-video-activity-7469774314452652032-br_Z", "kind": "post", "date": "2026-06-08T15:36:18.261000+00:00", "reactions": 0, "comments": 0, "engagement": 0, "text": "Take one step forward if your dad has ever taken you to school. Take one step forward if your dad has ever made you breakfast. Take one step forward if your dad has ever taken you to the park. Take one step forward if your dad has ever told you he loves you. Take one step forward if your dad has ever told you he's proud of you. Take one step forward if your dad has ever had a pillow fight with you. And take one step forward if your dad has ever went on a vacation with you. Now turn around.", "hook": "Take one step forward if your dad has ever taken you to school.", "ratio": 0.0, "band": "baseline", "name": "Daniel Space"}, {"id": "7469564849828544512", "url": "https://www.linkedin.com/posts/danfromhr_one-of-the-most-profoundest-changes-you-can-activity-7469564849828544512-UoUB", "kind": "post", "date": "2026-06-08T01:43:58.003000+00:00", "reactions": 17, "comments": 0, "engagement": 17, "text": "One of the most profoundest changes you can make for your own mental and emotional health is the boundary you create with yourself. Words, especially the words we use with ourselves are everything. As someone with an admittedly high tendency to feel that has had to come with a lot of training and learning, the biggest most powerful lesson is the words we use to describe our emotional state. Though it doesn't seem like a lot, the difference between: \"I am (emotion of choice), so happy, excited, jealous, sad, depressed, full of self hatred, in a funk, beyond moved, overjoyed, etc\" or \"I am FEELING (so happy, excited, jealous, sad, depressed, full of self hatred, in a funk, beyond moved, overjoyed, etc)\" is EVERYTHING It creates a very natural and necessary distance between the core being of yourself, that can OBSERVE your emotional state, wonder at it, question it, enjoy it, or react to it, without physically responding or reacting to it. It is an insanely powerful way to remind yourself that feelings are temporary things that you experience, not the guiding powers of your life", "hook": "One of the most profoundest changes you can make for your own mental and emotional health is the boundary you create with yourself.", "ratio": 1.0, "band": "baseline", "name": "Daniel Space"}, {"id": "7469199867123363840", "url": "https://www.linkedin.com/posts/danfromhr_heres-an-example-of-how-non-hr-people-really-activity-7469199867123363840-IbhI", "kind": "post", "date": "2026-06-07T01:33:39.345000+00:00", "reactions": 5, "comments": 1, "engagement": 6, "text": "CHRO Watch: Uber. The company says its HR cuts are not about AI. That may be the most important part. A business growing 25 percent a year just cut nearly a quarter of its People team. Not because revenue fell. Because the function, in its own words, had become too complex. On June 3, Uber confirmed it is reducing its People and Places organization, HR, recruiting, workplace facilities and culture, by 23 percent. That is less than 1 percent of the 34,000-person company, so this is not a distress cut. It is a redesign. CEO Dara Khosrowshahi told staff the changes are necessary to maximize the effectiveness of the People team, and leadership was explicit that this is not about AI. ▸ Read the timing, not just the number. The cut lands three weeks after Jill Hazelbaker took over People and Places inside a broader president role. A new leader inherited the function and her first visible move was to simplify it. That is org design, not cost-cutting. ▸ Notice where People now sits. It reports into a corporate affairs and communications leader, not a standalone CHRO. Whatever the intent, that says something about how the seat is valued, and it raises the premium on Operating Upwards for whoever runs the function day to day. ▸ The AI denial is the tell. Uber says this is not about AI, yet it has reportedly passed its 2026 AI budget in four months and already said it is slowing hiring as it adopts AI internally. You can take the denial at face value and still read the direction of travel. People is being asked to do what it helped finance and engineering do: get leaner and more strategic at once. That makes Business Acumen a baseline expectation for HR, not a differentiator. The CHRO takeaway: when even HR is restructured for efficiency, the question stops being how many people the function has and becomes what the function is for. Every CHRO should have that answer ready before someone above them writes one. Follow for more. #CHROWatch #SuccessionPlanning #PeopleStrategy #Leadership #uber", "hook": "CHRO Watch: Uber.", "ratio": 0.35, "band": "baseline", "name": "Daniel Space"}, {"id": "pulse:ghost-more-than-1990-romcomthriller-daniel-space-9n5xe", "url": "https://www.linkedin.com/pulse/ghost-more-than-1990-romcomthriller-daniel-space-9n5xe", "kind": "article", "date": "2026-06-06T00:00:00+00:00", "reactions": 1, "comments": 2, "engagement": 3, "text": "The metaphor itself is deeply primal. Shaping wet clay is the ultimate act of raw, physical creation: taking formless, chaotic earth and forcing it into order with your bare hands. Overlaying that heavy, physical labor with a story about a literal ghost (pure, disembodied spirit) is why the scene anchored itself so deeply into our collective psyche. It perfectly captured the intersection of the tangible material world and the intangible human soul. We mime the wheel because our subconscious recognizes the ancient, universal language of creation and connection.", "hook": "The metaphor itself is deeply primal.", "ratio": 0.18, "band": "baseline", "name": "Daniel Space"}, {"id": "pulse:danfromhr-phoenix-daniel-space-d9f1e", "url": "https://www.linkedin.com/pulse/danfromhr-phoenix-daniel-space-d9f1e", "kind": "article", "date": "2026-06-04T00:00:00+00:00", "reactions": 30, "comments": 10, "engagement": 40, "text": "In 2021, my mother was diagnosed with terminal cancer, and I became one of her primary caretakers until she passed. After her death, my world went entirely dark. I spent months physically locked inside a basement apartment, and that phone screen and TikTok app became my only remaining bridge to the living world. I forged real, deep friendships there - people I still value immensely, who made a brutally isolated chapter feel slightly less lonely. (Thank you @ Rob Cancilla , Amy Miller Farah Sharghi Tessa White , Francis Rhodes, aPHR , Jamie Jackson Ashley Herd Tianna Treichelt Veronica Gidstedt Jackie Cuevas Jack Appleby Bernadette Pawlik Tejal Rives -and a whole bunch of other wonderful people that I can't remember right now)", "hook": "In 2021, my mother was diagnosed with terminal cancer, and I became one of her primary caretakers until she passed.", "ratio": 2.35, "band": "working", "name": "Daniel Space"}, {"id": "pulse:15-sexual-harassment-training-corporate-theatre-daniel-space-hnxke", "url": "https://www.linkedin.com/pulse/15-sexual-harassment-training-corporate-theatre-daniel-space-hnxke", "kind": "article", "date": "2026-05-14T00:00:00+00:00", "reactions": 13, "comments": 3, "engagement": 16, "text": "That experience permanently altered my perspective on how ineffective most corporate harassment remediation truly is. The system treated the situation as a liability-management exercise instead of a human one. The training did not create empathy. It did not create accountability. It merely taught someone how to survive the process and left 8 people who suffered the actions to their own devices of a \"sorry about that, next time don't go to business events at bards\" feeling.", "hook": "That experience permanently altered my perspective on how ineffective most corporate harassment remediation truly is.", "ratio": 0.94, "band": "baseline", "name": "Daniel Space"}, {"id": "pulse:14-hrbps-you-solving-problem-creating-competency-daniel-space-bkdhe", "url": "https://www.linkedin.com/pulse/14-hrbps-you-solving-problem-creating-competency-daniel-space-bkdhe", "kind": "article", "date": "2026-05-10T00:00:00+00:00", "reactions": 8, "comments": 1, "engagement": 9, "text": "Most HR Business Partners spend the first part of their careers being rewarded for responsiveness. Someone escalates a conflict, a leader needs a hire approved, a reorg is messy, a team is spiraling, and the HRBP arrives with solutions in hand like a corporate paramedic carrying a clipboard instead of a crash kit - and in our eager desire to be liked and appreciated, we take it all on.", "hook": "Most HR Business Partners spend the first part of their careers being rewarded for responsiveness.", "ratio": 0.53, "band": "baseline", "name": "Daniel Space"}, {"id": "pulse:partnering-data-organization-daniel-space-wns7c", "url": "https://www.linkedin.com/pulse/partnering-data-organization-daniel-space-wns7c", "kind": "article", "date": "2026-05-06T00:00:00+00:00", "reactions": 10, "comments": 0, "engagement": 10, "text": "You do not need to become technical, nor do you need to view people solely as data points, but you should understand: the difference between analytics, insights, research and data science, what and how the data organization is supporting and how it's evolving in addition to fun words like statistical anomaly and outlier", "hook": "You do not need to become technical, nor do you need to view people solely as data points, but you should understand: the difference between…", "ratio": 0.59, "band": "baseline", "name": "Daniel Space"}, {"id": "pulse:27-mastering-tell-me-yourself-daniel-space-ruake", "url": "https://www.linkedin.com/pulse/27-mastering-tell-me-yourself-daniel-space-ruake", "kind": "article", "date": "2026-04-18T00:00:00+00:00", "reactions": 30, "comments": 2, "engagement": 32, "text": "I give a concise, high-level overview of my experience by focusing on key outcomes across roles. I’ll highlight things like building a 200-person data and analytics organization, rolling out internal mobility at Spotify, or designing a compensation model at WebMD so the interviewer immediately understands my scope and impact.", "hook": "I give a concise, high-level overview of my experience by focusing on key outcomes across roles.", "ratio": 1.88, "band": "baseline", "name": "Daniel Space"}, {"id": "pulse:12-critical-hrbp-role-designed-fail-daniel-space-bxo7e", "url": "https://www.linkedin.com/pulse/12-critical-hrbp-role-designed-fail-daniel-space-bxo7
