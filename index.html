e", "kind": "article", "date": "2026-04-08T00:00:00+00:00", "reactions": 32, "comments": 8, "engagement": 40, "text": "I did not have a roadmap when I stepped into this role. I learned through experience, mistakes, and working alongside strong leaders. Over time, patterns became clearer, and the role itself became more defined. Most HRBPs do not get that level of exposure or support, which is why so many are left trying to figure it out on their own.", "hook": "I did not have a roadmap when I stepped into this role.", "ratio": 2.35, "band": "working", "name": "Daniel Space"}, {"id": "pulse:dear-tim-i-wrote-3-years-ago-wish-had-been-wrong-daniel-space-pgwue", "url": "https://www.linkedin.com/pulse/dear-tim-i-wrote-3-years-ago-wish-had-been-wrong-daniel-space-pgwue", "kind": "article", "date": "2026-03-24T00:00:00+00:00", "reactions": 105, "comments": 14, "engagement": 119, "text": "That’s the point where something shifted for me. My sister in christ, what information should we share? That we had been pushing back and escalating the entire time and were fed lies to tell the business? That it was obviously a poorly thought out exercise? That Epic was so stupidly self-sabotaging in its control of information? That giving feedback and providing real performance notes was not something the company could do? The worst part was that another executive had to come to her rescue. She never once owned the very good points employees were making, but she did thank the executive for coming to her defense. Working wth data scientists I could easily predict the bonus that she got, small price to pay for your integrity.", "hook": "That’s the point where something shifted for me.", "ratio": 7.0, "band": "replicable", "name": "Daniel Space"}, {"id": "7471180623559331843", "url": "https://www.linkedin.com/posts/glencathey_stayweird-activity-7471180623559331843-bpWE", "kind": "post", "date": "2026-06-12T12:44:28.480000+00:00", "reactions": 49, "comments": 20, "engagement": 69, "text": "Heads up weirdos - it's our time to shine! According to Allie K. Miller - if you want real results from AI, find your weirdos. I'm happy to agree. And not just because I'm one. What does she mean by \"weirdos?\" The curious ones. The compulsive tinkerers. The people who push a tool until it breaks, then push harder. While many get stuck using AI at 5-10% of its potential, the weirdos are well past that. Not because they're more technical, but because they can't help but to wonder and experiment. Here's the part TA and HR should seriously think about...there's a very real chance that some of our hiring processes (and people) screen these people OUT, overlook their potential, and fail to reward them with recognition and advancement, whether consciously or unconsciously. Too different. Doesn't fit the mold. Hard to put in a box. Not like me/us (affinity bias, anyone???). Weird. Well, AI rewards weirdos. And here's why. \"Standard\" software rewards knowing the one right way to do a thing. Learn it once, and you were \"good at it.\" AI is the opposite. No manual. No single correct input. No \"right way\" to hold it. No limit to what you can do with it. The whole game is the loop - try something, read what comes back, adjust, try again. Then try the strange thing you're a little embarrassed to ask out loud. That loop is miserable for people who need to be right on the first try and for those who find uncertainty and not knowing uncomfortable. For weirdos, it's a playground. We were running it in our heads long before the tools showed up. So a question worth asking inside your own org and company - who are your weirdos? Do you even know? And are you supporting them and amplifying their ability to impact and transform your group or company, or quietly overlooking them or politely or unconsciously managing them out? I myself, am strange and unusual. For most of my career, being the \"weirdo\" in the room was something to manage. I have no doubt that my nature has been instrumental in the things I've figured out and contributed to in my career, but I can also say that it's not always safe or comfortable being the weirdo. And I am absolutely certain I am not alone. The good news? AI may give us a greater opportunity than we've ever had to make a difference to ourselves, to our companies, and to the world. #stayweird", "hook": "Heads up weirdos - it's our time to shine!", "ratio": 1.28, "band": "baseline", "name": "Glen Cathey"}, {"id": "7470848493218246656", "url": "https://www.linkedin.com/posts/glencathey_the-us-department-of-labor-has-shipped-three-activity-7470848493218246656-7fiX", "kind": "post", "date": "2026-06-11T14:44:42.436000+00:00", "reactions": 99, "comments": 21, "engagement": 120, "text": "The US Department of Labor has shipped three solid resources every TA and HR leader hiring in the US should know about. Over the past few months, the DOL has launched real artifacts as part of an effort to prepare America for the AI transformation of work: → The AI Literacy Framework (Feb 2026): five foundational content areas, seven delivery principles. Voluntary - but voluntary federal frameworks have a way of becoming benchmark expectations in audits, in lawsuits, in RFPs. Check it out - it's solid! → Make America AI-Ready (March 2026): a free, text-based, 7-day AI course - about 10 minutes a day. Text READY to 20202. No app, no laptop, no internet required. I've taken it myself - it's especially helpful for anyone who isn't already an AI power user. → The AI in Registered Apprenticeship Innovation Portal (April 2026): tools to integrate AI skills into new or existing apprenticeship programs, with industry-specific modules. Then layer in what Acting Labor Secretary (and former EEOC Commissioner) Keith Sonderling has said about AI in hiring: \"Using these tools, working with these developers, we may have the most transparent employment decisions ever because you can show exactly what went in the algorithm... But at the end of the day, the employer is still making that decision.\" That's the entire Automated Decision Making (ADM) compliance line in one sentence. Algorithmic inputs can be traced - but traceability only mitigates risk if you've actually documented your inputs, your Meaningful Human Involvement, and your override logic. What % of TA functions have done this? Your AI hiring stack will increasingly be evaluated against an emerging federal vocabulary, and free practitioner resources are already on the shelf. I'll share links in the comments. Have any of you used the framework, the AI course, or the apprenticeship portal yet? If you haven't - check them out.", "hook": "The US Department of Labor has shipped three solid resources every TA and HR leader hiring in the US should know about.", "ratio": 2.22, "band": "working", "name": "Glen Cathey"}, {"id": "pulse:bounded-vs-boundless-what-ai-building-itself-means-rest-glen-cathey-4qm0e", "url": "https://www.linkedin.com/pulse/bounded-vs-boundless-what-ai-building-itself-means-rest-glen-cathey-4qm0e", "kind": "article", "date": "2026-06-09T00:00:00+00:00", "reactions": 15, "comments": 11, "engagement": 26, "text": "Is customer service actually bounded? This is the more interesting failure, and it generates the real insight. The volume of inquiries is bounded. But quality is an unbounded dimension hiding inside the same role. Freed capacity can go into proactive outreach, retention, turning support from a cost center into a loyalty and revenue function. Which means bounded work can sometimes be converted into boundless work - by redefining the job around the open-ended dimension (the relationship, the prevention, the experience) instead of the capped one (tickets closed per hour).", "hook": "Is customer service actually bounded?", "ratio": 0.48, "band": "baseline", "name": "Glen Cathey"}, {"id": "pulse:asymmetry-imagination-why-we-can-see-jobs-ai-destroy-ones-glen-cathey-xotoe", "url": "https://www.linkedin.com/pulse/asymmetry-imagination-why-we-can-see-jobs-ai-destroy-ones-glen-cathey-xotoe", "kind": "article", "date": "2026-06-04T00:00:00+00:00", "reactions": 37, "comments": 16, "engagement": 53, "text": "When leaders mistake \"I can vividly picture the layoffs and can't picture the new roles\" for \"the future is contraction,\" they make contractionary decisions. They stop building. They stop developing people. They optimize for a shrinking world. And that becomes self-fulfilling - the talent version of a doom loop, where the prediction quietly creates the conditions that prove it right.", "hook": "When leaders mistake \"I can vividly picture the layoffs and can't picture the new roles\" for \"the future is contraction,\" they make contract…", "ratio": 0.98, "band": "baseline", "name": "Glen Cathey"}, {"id": "pulse:your-most-ai-exposed-roles-might-safest-glen-cathey-5l8le", "url": "https://www.linkedin.com/pulse/your-most-ai-exposed-roles-might-safest-glen-cathey-5l8le", "kind": "article", "date": "2026-06-02T00:00:00+00:00", "reactions": 27, "comments": 18, "engagement": 45, "text": "And here is the part that makes this so easy to miss - this may not come from any conscious strategy at all. No one has to issue a memo cutting junior headcount. It can happen when a mid-level or senior person, with no strategy in mind, simply uses AI to knock out the first-draft research, the cleanup, the analysis they would once have handed down. The work still gets done. It just never becomes a reason to hire. The latent demand that used to spill into an entry-level req quietly evaporates - not by design. Which is exactly why it may not surface in anyone's workforce plan until the pipeline is already thin.", "hook": "And here is the part that makes this so easy to miss - this may not come from any conscious strategy at all.", "ratio": 0.83, "band": "baseline", "name": "Glen Cathey"}, {"id": "pulse:how-100s-people-feel-ai-interviews-5-questions-you-glen-cathey-kfwge", "url": "https://www.linkedin.com/pulse/how-100s-people-feel-ai-interviews-5-questions-you-glen-cathey-kfwge", "kind": "article", "date": "2026-05-26T00:00:00+00:00", "reactions": 69, "comments": 16, "engagement": 85, "text": "The second version is also real. It's being built right now, by people who took the criticism seriously and designed around it. It's a fool's errand to try and make everyone happy (typically impossible), but if we let the loudest objections kill the entire experiment, we don't get a return to a human-first hiring process that never actually existed at the volumes we're operating at. We get the same broken process, just slower, with more ghosting and fewer chances for candidates to be seen at all.", "hook": "The second version is also real.", "ratio": 1.57, "band": "baseline", "name": "Glen Cathey"}, {"id": "pulse:mind-your-capability-gap-how-use-ai-reach-full-potential-glen-cathey-th3qe", "url": "https://www.linkedin.com/pulse/mind-your-capability-gap-how-use-ai-reach-full-potential-glen-cathey-th3qe", "kind": "article", "date": "2026-05-18T00:00:00+00:00", "reactions": 52, "comments": 17, "engagement": 69, "text": "I'll add my own experience here, because it's relevant. I've spent the majority of my nearly thirty years now in talent acquisition building and managing teams and training people in sourcing and recruiting - often people who came to my teams with no prior sourcing or recruiting experience whatsoever. Teaching from scratch, repeatedly, across decades, has not diminished my sourcing and recruiting judgment. It has deepened it, and I've often said it feels like \"unfair advantage\" I would not have gained had I not moved into leadership and had the opportunity to develop so many people in this domain. Every time I've had to articulate the why behind something to someone learning, I've had to re-examine and refine my own understanding of what actually works. The act of explanation, repeated across hundreds of practitioners and thousands of situations, has built and amplified the judgment I bring to the work today. I'd argue I have more accurate and useful sourcing and recruiting wisdom now than I had when I was personally doing it full-time, precisely because the required metacognition and coaching forced me to make tacit domain expertise explicit. (A separate observation worth its own article: the people I trained from scratch, with no prior experience, often outperformed those who came to my teams with prior recruiting backgrounds. That pattern is interesting enough that I'll write about it elsewhere.)", "hook": "I'll add my own experience here, because it's relevant.", "ratio": 1.28, "band": "baseline", "name": "Glen Cathey"}, {"id": "pulse:ai-doing-two-things-knowledge-work-right-now-only-one-glen-cathey-mlz4e", "url": "https://www.linkedin.com/pulse/ai-doing-two-things-knowledge-work-right-now-only-one-glen-cathey-mlz4e", "kind": "article", "date": "2026-05-04T00:00:00+00:00", "reactions": 33, "comments": 16, "engagement": 49, "text": "Also in my first 6 months, when my only source of candidates was an internal Lotus Notes ATS/database (before I used the internet, online job boards, and other sources) - when working challenging jobs I would often hit a wall. I had searched what felt like the entire internal database for hard-to-fill roles and I often wouldn't find anyone viable. However, I still had to produce at least 2 QIA candidates. So I wondered...", "hook": "Also in my first 6 months, when my only source of candidates was an internal Lotus Notes ATS/database (before I used the internet, online jo…", "ratio": 0.91, "band": "baseline", "name": "Glen Cathey"}, {"id": "pulse:ta-focused-look-stanfords-2026-ai-index-report-glen-cathey-erroe", "url": "https://www.linkedin.com/pulse/ta-focused-look-stanfords-2026-ai-index-report-glen-cathey-erroe", "kind": "article", "date": "2026-04-30T00:00:00+00:00", "reactions": 45, "comments": 10, "engagement": 55, "text": "If AI agents are advancing at this pace, what does the recruiter role look like in 2028? Agent accuracy on real computer tasks went from 12% to 66% in one year. If that trajectory continues, significant portions of the recruiting workflow - sourcing, screening, scheduling, even initial outreach - could be handled by agents within a few years (where allowed). The question isn't whether that happens. It's whether recruiters are developing the skills that AI agents can't replicate - judgment, relationship depth, strategic advisory capability.", "hook": "If AI agents are advancing at this pace, what does the recruiter role look like in 2028?", "ratio": 1.02, "band": "baseline", "name": "Glen Cathey"}, {"id": "pulse:ai-jobs-data-here-most-people-read-wrong-glen-cathey-tzkxe", "url": "https://www.linkedin.com/pulse/ai-jobs-data-here-most-people-read-wrong-glen-cathey-tzkxe", "kind": "article", "date": "2026-04-29T00:00:00+00:00", "reactions": 33, "comments": 14, "engagement": 47, "text": "4.  Protect the pipeline. If you're reducing or freezing entry-level hiring, you need an explicit strategy for how you'll develop the next generation of experienced workers. Apprenticeship models, structured mentorship, rotational programs - something. Because the market will not provide you with experienced talent in five years if nobody is developing them today, although an experienced talent shortage in the future could be a boon to experienced recruiters when this hits.", "hook": "4.", "ratio": 0.87, "band": "baseline", "name": "Glen Cathey"}, {"id": "7470821310894604289", "url": "https://www.linkedin.com/posts/hannahmorgan_ageism-you-complain-it-exists-but-what-activity-7470821310894604289-95GQ", "kind": "post", "date": "2026-06-11T12:56:41.665000+00:00", "reactions": 8, "comments": 9, "engagement": 17, "text": "My TEDx \"Ageism Loves Silence\" hit a raw nerve. 7,200 views in 48 hours. But, ageism doesn't lack awareness. It lacks people willing to stop waiting for someone else to fix it. Most executives know the bias exists. They've felt it in interviews that went cold. In feedback that said \"overqualified\" but meant \"too old.\" In rooms where the youngest voice gets the mic. They know. Because speaking up has a cost. It can follow you into the next interview. It can get you labeled \"difficult.\" It can make you the example instead of the hire. So the silence compounds. If you wait for corporate to care, you won't be just be older, you'll be dead. Doing something about it before it's too late? That's the hard part. That many people watching a talk about getting fired at 55? Evidence the silence is breaking. Watch. Comment. Share. https://lnkd.in/e-AcXGsD", "hook": "My TEDx \"Ageism Loves Silence\" hit a raw nerve.", "ratio": null, "band": "n/a", "name": "Hannah Morgan"}, {"id": "7470026506367389696", "url": "https://www.linkedin.com/posts/hunglee_geo-vs-seo-what-do-we-know-about-this-activity-7470026506367389696-kjL7", "kind": "post", "date": "2026-06-09T08:18:25.499000+00:00", "reactions": 44, "comments": 21, "engagement": 65, "text": "GEO vs SEO - what do we know about this? Not sure if anyone saw, but a couple week's ago, Google stopped being a search engine. Instead of retrieving information from the Internet, it Google will now Generate information based on information it has already crawled and summarise it for you. It even caused the great Irina Shamaeva 🇺🇦 to momentarily step back into the fray and announce the end of the sourcing as we know it! This is on trend for where we are going It's clear that our relationship with information discovery is changing, and whatever we see online is going to be mediated by AI or some sort. What are the implications for Employer Branding / Talent Attraction? How do we ensure that our employer 'gets into the training data'? Is it a matter of flooding Reddit and Glassdoor and - dare I say it - LinkedIn itself - with on brand content? Talking about this with Joveo this Friday, along with smart heads like Modiara Kamps Hannah King Alex Her Yazad Dalal and friends. https://lnkd.in/e5Dti5-9 Anyone else want to join or have any comment to add to the GEO vs SEO debate? Waiting for Chukowski to swing by and give me a rocket...", "hook": "GEO vs SEO - what do we know about this?", "ratio": 0.92, "band": "baseline", "name": "Hung Lee"}, {"id": "7469701031484964864", "url": "https://www.linkedin.com/posts/hunglee_this-week-in-recruiting-issue-271-activity-7469701031484964864-PY3V", "kind": "post", "date": "2026-06-08T10:45:06.240000+00:00", "reactions": 53, "comments": 49, "engagement": 102, "text": "WHAT IF AI COSTS MORE THAN HUMANS? With SpaceX, OpenAI and Anthropic poised for the biggest IPO the world has ever seen, there has never been a more appropriate time to read up on AI Token Economics. This is especially pertinent to us in People Ops, as we've been tasked with remodelling ourn organisations around AI workflows. But what if the REAL cost of AI is much higher than we've been led to believe? Topic of today's Open Kitchen, inspired by brilliant contributions from Chris Havrilla, Sarah White, Adam Gordon Joshua Hoffman, George LaRocque, Bill Fischer and Tony de Graaf in last week's Brainfood Live where we discussed this topic. 1️⃣ AI Token Cost Going Down, But AI Token Use is Going Up Jevon's Paradox is manifest in AI - as token cost goes down, token consumption goes up, as new uses are found for AI. Consumption is overtaking cost reduction though, so overall cost of AI is increasing for every company that seriously uses it 2️⃣ Where Do Companies Actually Spend Their AI Tokens? It's Engineering vs the Rest, especially since the arrival of AI Coding Agents, and this remains the place where the risk of catastrophic AI budget overspend is still located.... 3️⃣ But You Don't Need to Be an Engineer to Blow the AI Budget! Rise of Vibe Coding means that everyone is a product maker, and everyone a potentially significant consumer of AI tokens 4️⃣ Risk Controls Hard Limit - i.e Uber $1500 per capita budget Context Discipline - agents need constraints, 'only use this' etc Response Caching - web infra technique, common requests = cache response Anti-infinity Loop - hard limit on inference calls, tool calls etc. Model Switching - automatedshopping around, different tasks, different models Open Source + On-prem - download an open source model and run it yourself! 5️⃣ Our Task in People Ops: Reevaluate the Human Cost vs Return Just as cost of employee is more than payroll, value of employee is more than revenue per capita. We need to include in the calculation the 'human value added' - the osmotic information transfer, the adaptability of human workers, the self directed action, the collective intelligence, the institutional knowledge... Thanks to our friends Greenhouse Software for supporting this newsletter. Recruiters Guide to Job Applicant Fraud, in the link below ------------------------------------------------------------------------------- WHAT IS GOING ON - Big List of Recruiting & HR Events in 2026 - Exclusive Dinner at the Shard on Weds 10th - TA Execs, link for waitlist! - GEO vs SEO with Joveo with Modiara Kamps Hannah King Yazad Dalal and friends. - The State of AI Fluency with TestGorilla, next week 17th!", "hook": "WHAT IF AI COSTS MORE THAN HUMANS?", "ratio": 1.45, "band": "baseline", "name": "Hung Lee"}, {"id": "pulse:week-recruiting-issue-271-hung-lee-unsne", "url": "https://www.linkedin.com/pulse/week-recruiting-issue-271-hung-lee-unsne", "kind": "article", "date": "2026-06-08T00:00:00+00:00", "reactions": 53, "comments": 49, "engagement": 102, "text": "Finally, the most radical risk control may ultimately be the oldest one: owning the infrastructure yourself.  The rise of open-weight models has revived the logic of on-premise servers. Companies can now download highly capable models and run them on their own hardware, and remove the token cost entirely - pay for the electricity and you’re done. This last protection is the strongest argument for true Open Source AI, vs the Closed Source AI which is metered to you by private companies with the profit incentive. It’s probably not coincidental that both ‘Open’AI and Anthropic have been leading lobbying campaigns for the US Government to ban open source providers, ostensibly on national security grounds but perhaps the real threat that the one it poses to their cloud based, metered AI business model. Even US companies are voting with their feet - economics make too much sense for high volume users not to go open source, so outside of legislative ban, we are going to see more companies shift to on-prem AI. Interestingly for us in recruitment, this trend may signal the rise of significant hiring demand for new roles like AI FinOps, AI System Admin and the like. Happy days!", "hook": "Finally, the most radical risk control may ultimately be the oldest one: owning the infrastructure yourself.", "ratio": 1.45, "band": "baseline", "name": "Hung Lee"}, {"id": "7467500192032878592", "url": "https://www.linkedin.com/posts/hunglee_ai-token-cost-vs-human-fte-is-the-bill-activity-7467500192032878592-Udwj", "kind": "post", "date": "2026-06-02T08:59:45.225000+00:00", "reactions": 153, "comments": 122, "engagement": 275, "text": "AI TOKEN COST vs HUMAN FTE - is the bill for the former coming due? The conversation on AI adoption has moved to token budgets. As providers shift to usage based billing, its suddenly turning out that AI Agents doing the work might actually be much more expensive than we thought. Not only this, but we are no longer in control of that cost, as we're now dependent on a third party provider who can escalate the costs to us as they see fit. Rolling back to pre-AI workflow isn't an option, because we've fired the team that knew how to do it. How real is the above scenario? Are TA / HR / People Ops in this conversation at all? We're talking about it this Friday on Brainfood Live with George LaRocque Chris Havrilla Joshua Hoffman Bill Fischer Tony de Graaf and more. Register here folks: https://lnkd.in/ed2_JSbp", "hook": "AI TOKEN COST vs HUMAN FTE - is the bill for the former coming due?", "ratio": 3.9, "band": "working", "name": "Hung Lee"}, {"id": "7467173366827823106", "url": "https://www.linkedin.com/posts/hunglee_this-week-in-recruiting-issue-270-activity-7467173366827823106-GhD4", "kind": "post", "date": "2026-06-01T11:21:04.024000+00:00", "reactions": 57, "comments": 55, "engagement": 112, "text": "THIS WEEK, IN RECRUITING - ISSUE 270 RECRUITING IS ALWAYS GOING TO NEED THE HUMAN TOUCH...? This was kind of the subtext of my talk at recruiTECH CEE in Budapest last week. Unfortunately, I don't think I properly made the case, so I hope I am able to go some way toward doing a better job of it here. Human touch is required, but not always, so we better understand under what circumstances it is. Here are 5... 1️⃣ WHEN COLLABORATION INTENSITY IS HIGH Example: football teams, its not about the player, its about the team...hence I endorse Tuchel's selection of Jordan Henderson - guy is good for the dressing room! 2️⃣ WHEN REAL CALIBRATION IS NEEDED Sometimes its too chaotic a process for AI to handle, however 'agentic' it thinks it is. You're going to need to do a lot of phone work if you're hiring blue collar 3️⃣ WHEN EMOTIONAL STATES ARE HIGH Job search is an emotional sine wave, not steady state. Human recruiters can make decisive contributions if we understand where the candidate is emotionally in the flow 4️⃣ WHEN THE DECISION IS A BIG DEAL (FOR THE CANDIDATE) The details for some jobs might not really be that important but for some others, they are crucial. 5️⃣ WHEN THE DECISION IS A BIG DEAL (FOR THE EMPLOYER) Strategically important / Rare / Exec hires need to be treated differently - and almost always feature human overservicing of the candidate. 6️⃣ ANY MORE? Thanks to our friends at Greenhouse Software for supporting this week's newsletter. What are the legal and security risks of using AI in hiring? On-demand webinar on this topic in the link below ------------------------------------------------------------------------------- WHAT IS GOING ON? - Big List of Recruiting / HR Events to Attend in 2026 - get on the speaker circuit btw, nothing better for profile, and no one can afford to be invisible in today's market - What if AI Costs More than Humans? - we're talking token economics in this Friday's Brainfood Live. Essential for folks to sign up to this with Joshua Hoffman Chris Havrilla Bill Fischer George LaRocque Tony de Graaf - TA Disruptors Live next week with Arctic Shores. I'm MCing this but don't let that put you off, 100+ TA leaders in the house - TA Exec Dinner on the 10th June with CoderPad. 5 seats left for this, if you are a TA Leader / Head of function and want to join 15 of your peers at the Shangri-LA on the Shard, click on the link and apply. - GEO vs SEO with our friends Joveo. In light of what is going on with Google Search, EB / TA folks should join this show with Yazad Dalal Modiara Kamps Hannah King and friends.", "hook": "THIS WEEK, IN RECRUITING - ISSUE 270 RECRUITING IS ALWAYS GOING TO NEED THE HUMAN TOUCH...?", "ratio": 1.59, "band": "baseline", "name": "Hung Lee"}, {"id": "pulse:week-recruiting-issue-270-hung-lee-hj3ee", "url": "https://www.linkedin.com/pulse/week-recruiting-issue-270-hung-lee-hj3ee", "kind": "article", "date": "2026-06-01T00:00:00+00:00", "reactions": 57, "comments": 55, "engagement": 112, "text": "Collaboration intensity is a description of work where collaboration with other humans is critical for output and outcomes. The concept first came into mainstream talent ops thinking during the pandemic era when enforced shift to remote revealed the variance in collaboration intensity in job roles which was previously hidden when everyone was in the office, in the same building. Jobs with low collaboration intensity were most easily remote-able because the individual could do the job without input / output from others, and so could do so from anywhere. Conversely, jobs with high collaboration intensity created bottlenecks which weren’t easily resolved remotely - hence increased frequency of calibration calls and the onset of ‘Zoom fatigue’. It was only with the enforced shift to asynchronous, written communication that we got some sort of flow back to collaboration intense work in a remote setting. Even then, it proved unsatisfactory, as ‘creativity’ and innovation which comes from these constant yet irregular inputs / outputs was found (or claimed) to be lacking, leading to the loud class for RTO.", "hook": "Collaboration intensity is a description of work where collaboration with other humans is critical for output and outcomes.", "ratio": 1.59, "band": "baseline", "name": "Hung Lee"}, {"id": "pulse:week-recruiting-issue-269-hung-lee-ojuoe", "url": "https://www.linkedin.com/pulse/week-recruiting-issue-269-hung-lee-ojuoe", "kind": "article", "date": "2026-05-25T00:00:00+00:00", "reactions": 45, "comments": 15, "engagement": 60, "text": "In this framing, AI is going to automate ‘the work, that isn’t the work’ and everyone becomes the winner - the worker who gets more fulfilling work to do, the employer who gains a more productive (x10!) employee and the service receiver - the school kid or the candidate - who gets better service. However, one thing we’re learning about the impact of AI on the world of work is that for every positive story, there is a negative angle. It was my friend Martyn Redstone who first introduced me to the idea that routine, repetitious work might actually be a form of cognitive rest - because doing higher value work all of the time might actually be quite exhausting. The idea that AI does not reduce workload but actually concentrates the most cognitively demanding tasks is now being studied, with the implications for employee well being, mental health and ultimately job performance seemingly quite obvious. Will we re-design monotony back into the job description, in order to provide some cognitive rest? Somehow I doubt that this is going to be the outcome - more likely, we’re just going to burn through the employees and when they do eventually frazzle out, simply replace them with more durable workers who won’t have the fragility of being biological, sociological beings.", "hook": "In this framing, AI is going to automate ‘the work, that isn’t the work’ and everyone becomes the winner - the worker who gets more fulfilli…", "ratio": 0.85, "band": "baseline", "name": "Hung Lee"}, {"id": "7462912517917446144", "url": "https://www.linkedin.com/posts/hunglee_geo-vs-seo-what-recruitment-marketers-need-activity-7462912517917446144-BI2f", "kind": "post", "date": "2026-05-20T17:09:58.481000+00:00", "reactions": 31, "comments": 20, "engagement": 51, "text": "GEO vs SEO: What Recruitment Marketers Need to Know in 2026 GEO vs SEO: What Recruitment Marketers Need to Know in 2026 Everyone know's the search landscape has fundamentally shifted. In 2026, candidates are no longer typing keywords into Google - they are asking AI assistants where to work, who pays fairly, and which cultures actually thrive. If your recruitment marketing strategy still revolves around traditional SEO alone, you are optimising for a shrinking platform while missing the one that is exploding. Join us for a critical livestream exploring the new battleground between Generative Engine Optimisation and classic Search Engine Optimisation.", "hook": "GEO vs SEO: What Recruitment Marketers Need to Know in 2026 GEO vs SEO: What Recruitment Marketers Need to Know in 2026 Everyone know's the…", "ratio": 0.72, "band": "baseline", "name": "Hung Lee"}, {"id": "7462907916157673472", "url": "https://www.linkedin.com/posts/hunglee_what-if-ai-actually-costs-more-than-humans-activity-7462907916157673472-6QFw", "kind": "post", "date": "2026-05-20T16:51:41.336000+00:00", "reactions": 43, "comments": 31, "engagement": 74, "text": "What if AI Actually Costs More Than Humans? What if AI Actually Costs More Than Humans? The headcount reduction mandate has landed on your desk: replace talent with AI and cut costs. But beneath the vendor demos and boardroom promises lies a dangerous assumption - that artificial intelligence is automatically cheaper than human expertise. What if the token economics tell a different story?", "hook": "What if AI Actually Costs More Than Humans?", "ratio": 1.05, "band": "baseline", "name": "Hung Lee"}, {"id": "pulse:week-recruiting-issue-268-hung-lee-c9mic", "url": "https://www.linkedin.com/pulse/week-recruiting-issue-268-hung-lee-c9mic", "kind": "article", "date": "2026-05-18T00:00:00+00:00", "reactions": 46, "comments": 22, "engagement": 68, "text": "The ROK has a reputation of having the best public wifi anywhere and having spent just a week there, I think I am ready to confirm. 5G everywhere, public wifi everywhere, no closed wifi, no log in required, no time limit for usage. I remember being in an abandoned paddy field in Gyeongju looking for a monument only to check my wifi and see it solidly at 5G with massive upload / download speeds. It goes without saying that this was a fantastic feeling, something that when combined with AI and may be AR, is going to have a substantive impact on how the future economy is going to look like. Now I get that having the entire population always online may contribute to excessive digital engagement but it also means that you never lose time during periods of going away from your office. In London - ostensibly a first world city, in one of the most advanced economies in the world, you will get ‘fake 5g’ in central locations, because whilst it says you're connected, you cannot actually access the Internet. The economic damage of having de facto dead zones in your capital city is hard to calculate, but I can imagine it being substantive, especially for a services dependent knowledge economy like the UK. This is evidence of the value of government policy - Korea does not have access to any special technology unavailable to the UK - it has simply treated fast, widely available internet access as a strategic goal and invested accordingly.", "hook": "The ROK has a reputation of having the best public wifi anywhere and having spent just a week there, I think I am ready to confirm.", "ratio": 0.96, "band": "baseline", "name": "Hung Lee"}, {"id": "pulse:week-recruiting-issue-267-hung-lee-t6exc", "url": "https://www.linkedin.com/pulse/week-recruiting-issue-267-hung-lee-t6exc", "kind": "article", "date": "2026-05-11T00:00:00+00:00", "reactions": 51, "comments": 22, "engagement": 73, "text": "You need to be clear on why you’re doing the thing. This is crucial not for others, but you. There will be many times on the journey that you will hit the ‘quit point’ - the point when you ask yourself ‘is this really worth it’? This will either be some sort of direct setback or a period where there is no discernible sign of forward progress. For me, this actually came really early on - in Issue No2 of Recruiting Brainfood. I had sent the newsletter to not only a small number of people (<100) but upon doing so the second time, actually lost a dozen or so subscribers and went down 80 or so. It was demoralising stuff and I could have quit right then. But I remembered the  purpose of doing it in the first place, which was simply to curate great pieces of content online which got me thinking in a different way about recruiting topics, and I realised that the purpose would be intact regardless of how many or how few people similarly cared about it.", "hook": "You need to be clear on why you’re doing the thing.", "ratio": 1.04, "band": "baseline", "name": "Hung Lee"}, {"id": "pulse:week-recruiting-issue-266-hung-lee-usroc", "url": "https://www.linkedin.com/pulse/week-recruiting-issue-266-hung-lee-usroc", "kind": "article", "date": "2026-05-04T00:00:00+00:00", "reactions": 32, "comments": 32, "engagement": 64, "text": "For those of us in recruitment, this is the moment where our professional identity must stretch or break. We have been in the business of matching people to roles for the better part of a half century. But what happens when the roles run out for a significant minority, and the gap between the economically valued and the economically invisible becomes too wide for social stability to bear? I’m not going to pretend there is a neat answer. But in 2026, we can see the contours of the new game: some nations are experimenting with public “human contribution” currencies that reward verified caring, community building, and creative labour that AI cannot or should not simulate. Others are trying aggressive firm-level co-determination laws to force employers to internalise the social cost of AI-driven labour shedding. The EU’s AI Employment Directive, due to be voted on this autumn, will mandate that companies beyond a certain size conduct binding “human-impact assessments” before deploying AI that eliminates whole job families — with recruitment teams required to demonstrate they have exhausted every re-skilling pathway before roles are declared dead.", "hook": "For those of us in recruitment, this is the moment where our professional identity must stretch or break.", "ratio": 0.91, "band": "baseline", "name": "Hung Lee"}, {"id": "pulse:week-recruiting-issue-265-hung-lee-hbz4e", "url": "https://www.linkedin.com/pulse/week-recruiting-issue-265-hung-lee-hbz4e", "kind": "article", "date": "2026-04-27T00:00:00+00:00", "reactions": 45, "comments": 18, "engagement": 63, "text": "Software engineering has been living this reality for eighteen months. Junior developers equipped with Copilot or Cursor are generating pull requests at a rate that senior engineers cannot humanly review. The AI produces the code; the ‘human-in-the-loop’ must review, test, and integrate. But the senior devs are the same finite resource they always were. And the organisational response to this bottleneck is almost always the same: more AI. You add an AI code reviewer to handle the volume. Then you realise that the AI reviewer's output still needs human oversight, but the humans are already over capacity, so you add an AI coordination layer to triage which reviews actually need a person. Then the coordination layer needs to understand business priorities, so you feed it strategy documents and meeting transcripts. Before you've taken a breath, you've built a small constellation of AI agents all talking to each other, and the human has shifted from bottleneck to liability - the slow, error-prone component in an otherwise elegant machine-speed pipeline.", "hook": "Software engineering has been living this reality for eighteen months.", "ratio": 0.89, "band": "baseline", "name": "Hung Lee"}, {"id": "pulse:week-recruiting-issue-264-hung-lee-2tdre", "url": "https://www.linkedin.com/pulse/week-recruiting-issue-264-hung-lee-2tdre", "kind": "article", "date": "2026-04-20T00:00:00+00:00", "reactions": 48, "comments": 16, "engagement": 64, "text": "Recruitment agencies would still be sitting pretty despite all of these changes, were it not for another huge change, this time in the financial world. The Great Financial Crisis and the policy responses of most of the Western governments at the time, set the stage for the moment we have today. In many respects, whether you’re a winner or a loser in 2026 was decided in 2008. Quick historical reminder: financial engineering in the US led to the bizarro world where bad debt (sub prime mortgages) was turned into good product by the alchemy of Collateralised Debt Obligations or CDO’s. By aggregating subprime mortgages and then microslicing them into CDO’s, which could then be sold as new financial assets, the risk was diffused across a large range of holders and so, the risk to each individual holder was minimal, if not close to actual zero. Seemed like a no lose proposition so CDO’s sold like hot cakes across the global financial system. Banks from Iceland to pension funds in Canada all piled into US CDO’s. Risk was distributed alright, because when the trust in the idea evaporated, CDO’s flooded back on the market, couldn’t find any sellers and the entire system went into panic mode because no one could accurately say how badly they were exposed. The US financial system came close to collapse but rather than let it go, Obama decided (did he really have a choice?) to bail out the banks to the turn of $20 trillion USD, and the agreement of the US Federal Reserve to hold interest rates at close to zero in order for this cash to be put out into the market, which spurred the asset price inflation which made householders happy with their paper gains of value, whilst increasingly marginalising renters who saw the property ladder being pulled up away from them. Winners vs Losers.", "hook": "Recruitment agencies would still be sitting pretty despite all of these changes, were it not for another huge change, this time in the finan…", "ratio": 0.91, "band": "baseline", "name": "Hung Lee"}, {"id": "pulse:week-recruiting-issue-263-hung-lee-lsree", "url": "https://www.linkedin.com/pulse/week-recruiting-issue-263-hung-lee-lsree", "kind": "article", "date": "2026-04-13T00:00:00+00:00", "reactions": 42, "comments": 18, "engagement": 60, "text": "Donald Trump is a significant figure for us recruiters to understand. As economist  Richard Baldwin succinctly put it, Trump is emotionally coherent, but economically incoherent. He will do things which feel right to him, even when all the evidence continually points to the opposite outcome intended. He is also predictably mercurial - bringing chaos because he operates best when he is playing by no rules, and when everyone else is still unsure whether the rules still apply. All this creates a global macro environment which is impossibly chaotic - one where strategy gives away to agility, and one which responsible CEOs will increasingly shift fixed cost into the variable cost column. That means payroll folks, one of the largest line items in any company ledger, will be relentlessly reduced as the external chaos continues to unfold. Good news for AI; good news even for technology vendors who offer increased productivity for smaller teams. It’s even good news even for Recruiting Brainfood, as recruitment technology firms increase their battle for the mindshare of a TA community which has to shift more budget from payroll into tooling, and hence supply me with sponsor revenue. But it is very bad news for the people in Talent Acquisition, who will continue to see suppressed headcount growth (no hire, no fire economy), TA teams cut even further than the ratio’s would otherwise dictate.", "hook": "Donald Trump is a significant figure for us recruiters to understand.", "ratio": 0.85, "band": "baseline", "name": "Hung Lee"}, {"id": "pulse:week-recruiting-issue-262-hung-lee-0este", "url": "https://www.linkedin.com/pulse/week-recruiting-issue-262-hung-lee-0este", "kind": "article", "date": "2026-04-07T00:00:00+00:00", "reactions": 55, "comments": 21, "engagement": 76, "text": "Creating an organisational system which can absorb the dynamically changing outputs of every AI-enabled Superworker, and convert it into value, is what Dorsey, Rechtman and Asthana are essentially saying to do. This is necessarily a much looser system. The distance between the nodes is greater, the relationships between them much less rigid, in order to create the organisational elasticity required to deal with surges of output as new breakthroughs in method move into production. In management consultancy, we often hear about the ‘organisational pyramid’ turning into an ‘organisational diamond’, where the junior ranks are progressively depleted, in favour of expanding force of experienced individual contributors, but the analogy may be less a matter of structural geometry and more a case of state of matter; in the Dorsey worldview, it's not the shape of organisational structure that is important, but the state of organisational structure. He’s moving from solid state (pyramid or diamond - both are pretty solid!), to a liquid state, where individual workers are in contact with each other but not bound tightly to one another and move freely around within the confines of the whole.", "hook": "Creating an organisational system which can absorb the dynamically changing outputs of every AI-enabled Superworker, and convert it into val…", "ratio": 1.08, "band": "baseline", "name": "Hung Lee"}, {"id": "7463284658777010176", "url": "https://www.linkedin.com/posts/keriohlrich_hrwarrior-hrleadership-humanresources-activity-7463284658777010176-menY", "kind": "post", "date": "2026-05-21T17:48:43.776000+00:00", "reactions": 4, "comments": 0, "engagement": 4, "text": "HR wasn’t meant to be endless firefighting. Yet so many HR professionals spend their days reacting instead of influencing. Constantly on call. Solving problems. Carrying the emotional weight of organizations while trying to create meaningful change. We know because we’ve lived it. That’s exactly why we created the The Way of the HR Warrior course series built around our CHARGE® framework. These courses are designed to help HR professionals: Move from reactive to influential Build confidence and credibility Navigate hard conversations with courage Make a lasting impact on employees and organizations Actually enjoy the work they love again This isn’t corporate fluff or textbook HR theory. It’s real talk. Real case studies. Real tools. Created by people who have been in the trenches and truly understand the complexity of modern HR. Because we see you. And honestly? We love HR people. You deserve development that feels human, practical, empowering, and actionable. And apparently…others agree. ❤️ “Finding HR Warrior felt like finding my tribe. It was the first time I felt understood as a human in HR, rather than just a corporate cog.” — Jessika Grenner, Director of People Operations Join the Waitlist link: #HRWarrior #HRLeadership #HumanResources #HRCommunity #PeopleLeaders #LeadershipDevelopment #TheWayOfTheHRWarrior #CHARGEFramework", "hook": "HR wasn’t meant to be endless firefighting.", "ratio": null, "band": "n/a", "name": "Keri Ohlrich"}, {"id": "7471284120552206336", "url": "https://www.linkedin.com/posts/kieran-snyder_activity-7471284120552206336-ze8N", "kind": "post", "date": "2026-06-12T19:35:44.086000+00:00", "reactions": 0, "comments": 0, "engagement": 0, "text": "Looking to create a page for a business? Get help", "hook": "Looking to create a page for a business?", "ratio": 0.0, "band": "baseline", "name": "Kieran Snyder"}, {"id": "7471272680084844544", "url": "https://www.linkedin.com/posts/kieran-snyder_activity-7471272680084844544-EFf1", "kind": "post", "date": "2026-06-12T18:50:16.466000+00:00", "reactions": 0, "comments": 0, "engagement": 0, "text": "Looking to create a page for a business? Get help", "hook": "Looking to create a page for a business?", "ratio": 0.0, "band": "baseline", "name": "Kieran Snyder"}, {"id": "7471223091159932928", "url": "https://www.linkedin.com/posts/kieran-snyder_activity-7471223091159932928-RdVB", "kind": "post", "date": "2026-06-12T15:33:13.545000+00:00", "reactions": 0, "comments": 0, "engagement": 0, "text": "Looking to create a page for a business? Get help", "hook": "Looking to create a page for a business?", "ratio": 0.0, "band": "baseline", "name": "Kieran Snyder"}, {"id": "7471218038445379584", "url": "https://www.linkedin.com/posts/kieran-snyder_end-of-week-reflection-in-any-job-some-activity-7471218038445379584-6ZxR", "kind": "post", "date": "2026-06-12T15:13:08.884000+00:00", "reactions": 16, "comments": 8, "engagement": 24, "text": "End-of-week reflection: In any job, some work is more fun than the rest. You find this work joyful in nearly any context. Even when it is hard, the time flies by because you find it fun, fulfilling, and personally satisfying. Everyone has this joy mode. We like our jobs more or less based on how much of our time we spend in our personal joy mode. I can enjoy many kinds of work. But for me, joy mode is clearly teaching, writing, and storytelling work. The more time I get to spend on this, the happier I am. What kind of work is your joy mode? ** I'm Kieran Snyder, an AI exec, former CEO, and data storyteller who publishes new data and comics about AI, management, and work at nerd processor. Give me a follow if you like this stuff!", "hook": "End-of-week reflection: In any job, some work is more fun than the rest.", "ratio": 0.47, "band": "baseline", "name": "Kieran Snyder"}, {"id": "7470875263762067457", "url": "https://www.linkedin.com/posts/kieran-snyder_most-saas-companies-are-trying-to-ai-ify-activity-7470875263762067457-bNL6", "kind": "post", "date": "2026-06-11T16:31:05.031000+00:00", "reactions": 34, "comments": 17, "engagement": 51, "text": "Most SaaS companies are trying to AI-ify their offerings to stay relevant. As a rule, this looks like adding \"do this task with AI\" buttons and/or adding \"AI teammates\" into existing workflows. If I were leading a legacy SaaS company right now, this is not what I would do. I think there are only two plays for legacy SaaS companies: be the authoritative data source, or promise an outcome. BE THE AUTHORITATIVE DATA SOURCE If you're fortunate enough to be a system of record rather than a point solution, your customers have created mountains of proprietary business data from using your product. That data is locked up in your system. Even if your workflows are legacy, the data likely is still essential. Clean, real, authoritative data is gold for a company that is modernizing with AI; maybe workflows were your old value prop, but now it's the data and its usability. PROMISE AN OUTCOME In a world where workflows are getting commoditized, outcomes are highly differentiating. It's no longer enough to make it possible for customers to do work; they want the work itself to be completed. Most legacy SaaS companies are not comfortable promising outcomes. I get it! We promised outcomes early at Textio and got all the benefits and hellish scar tissue that stemmed from that. But in the current market, your customers are generally more interested in paying for an end result than for a bunch of workflows that need to be manually applied. Try as I might, I can't see other moves for legacy SaaS companies. What else am I missing? ** I'm Kieran Snyder, an AI exec, former CEO, and data storyteller who publishes new data and comics about AI, management, and work at nerd processor. Give me a follow if you like this stuff!", "hook": "Most SaaS companies are trying to AI-ify their offerings to stay relevant.", "ratio": 1.0, "band": "baseline", "name": "Kieran Snyder"}, {"id": "7470129240877789184", "url": "https://www.linkedin.com/posts/kieran-snyder_this-moment-in-uninspired-parenting-happened-activity-7470129240877789184-JjIq", "kind": "post", "date": "2026-06-09T15:06:39.315000+00:00", "reactions": 55, "comments": 27, "engagement": 82, "text": "This moment in uninspired parenting happened in my house last week: Me, to 16yo old: It's just you and me for dinner tonight. What should we have? 16yo: I'm craving sushi. Me: Actually, I'm going to order pizza. See, by the time I asked the 16yo what she wanted for dinner, I wasn't really looking for input. I had already kind of decided to order pizza. There is nothing more frustrating to someone than when you ask for their feedback, but have little intention of using it. Most leaders have done this. Nearly every employee survey does this. This week’s comic shows this in action, and in the chat, I share more about why we do this even when we know better. In the end, my 16yo called me out on my fake feedback-asking. We ordered sushi. ❤️ ** I'm Kieran Snyder, an AI exec, former CEO, and data storyteller who publishes new data and comics about AI, management, and work at nerd processor. Give me a follow if you like this stuff!", "hook": "This moment in uninspired parenting happened in my house last week: Me, to 16yo old: It's just you and me for dinner tonight.", "ratio": 1.61, "band": "baseline", "name": "Kieran Snyder"}, {"id": "7469775091745357824", "url": "https://www.linkedin.com/posts/kieran-snyder_last-night-our-17yo-had-her-boyfriend-over-activity-7469775091745357824-FIkM", "kind": "post", "date": "2026-06-08T15:39:23.582000+00:00", "reactions": 269, "comments": 30, "engagement": 299, "text": "Last night, our 17yo had her boyfriend over for dinner for the first time. Our other two kids were out, so it was just parents + 17yo + boyfriend. Unfortunately for the boyfriend, dinner timing was midstream on a project they were doing where our daughter was dying his hair a wacky color. So he had to come down to dinner with his girlfriend's parents for the first time with his hair pulled into 20 neat little sections covered in bleach. 🤣 It takes a certain kind of confidence to pull that off and still show up ready to talk about your chemistry class and fencing lessons and summer plans at the dinner table. Going to think about this the next time I feel nervous about a work event where I have to be \"on\" but don't feel like it. In your next big meeting, may you have the confidence of a 17yo having dinner with his girlfriend's parents for the first time!", "hook": "Last night, our 17yo had her boyfriend over for dinner for the first time.", "ratio": 5.86, "band": "replicable", "name": "Kieran Snyder"}, {"id": "7468736337873932288", "url": "https://www.linkedin.com/posts/kieran-snyder_end-of-week-reflection-no-one-is-more-fun-activity-7468736337873932288-ZAlf", "kind": "post", "date": "2026-06-05T18:51:45.360000+00:00", "reactions": 65, "comments": 6, "engagement": 71, "text": "End-of-week reflection: No one is more fun to work with than an energized builder. This is someone who: * Is more focused on what might be possible than on what is impossible * Spends more time building than criticizing others * Offers feedback proactively and constructively to make things better * Makes work more fun You don't have to have a big personality. You don't have to exude toxic positivity. You do have to want the best, work for the best, and be willing to take risks and learn. I spent this week with my team in Mountain View and had great collaboration with many energized builders, so this is on my mind ending the week. Happy Friday! ☀️", "hook": "End-of-week reflection: No one is more fun to work with than an energized builder.", "ratio": 1.39, "band": "baseline", "name": "Kieran Snyder"}, {"id": "7468345146309332992", "url": "https://www.linkedin.com/posts/kieran-snyder_if-you-are-not-reading-nick-mehtas-newsletter-activity-7468345146309332992-nGpF", "kind": "post", "date": "2026-06-04T16:57:18.023000+00:00", "reactions": 28, "comments": 12, "engagement": 40, "text": "If you are not reading Nick Mehta's newsletter, you are missing out on the most human, moving writing from a tech leader that I've yet found on the internet. Consider this a (strictly unbiased) PSA. I have no stake in the newsletter. But every time I read an issue, I feel moved. And having just read this week's letter, I feel compelled to share it with others. That's what I have for you this Thursday. Happy reading!", "hook": "If you are not reading Nick Mehta's newsletter, you are missing out on the most human, moving writing from a tech leader that I've yet found…", "ratio": 0.78, "band": "baseline", "name": "Kieran Snyder"}, {"id": "7467592766273982464", "url": "https://www.linkedin.com/posts/kieran-snyder_this-weeks-comic-is-inspired-by-something-activity-7467592766273982464-Nafw", "kind": "post", "date": "2026-06-02T15:07:36.644000+00:00", "reactions": 34, "comments": 15, "engagement": 49, "text": "This week's comic is inspired by something Daniel Chait tweeted many years ago, “Everyone else’s business looks easy from the outside.” It is a simple and elegant truth: everyone else's business does look easy from the outside, especially if it is successful. But I've worked with enough founders and executives to know that the appearance of ease is always, 100% of the time, a lie. People who are successful have usually chosen to optimize for something. But in choosing something to optimize for, you inherently trade off something else. E.g. * Want career stability? Work at one company for 25 years and become incapable of getting hired anywhere else. * Want autonomy? Drop your W-2 lifestyle and become permanently anxious about money. * Want relevance in AI? Build your fleet of superagents and become incapable of unplugging. * Want to be “mission driven”? Merge your entire personality with your employer and experience every reorg as a breakup. * Want to be indispensable? Become the only person who knows how anything works and spend every vacation secretly checking Slack from the bathroom. In the end, choices are just about tradeoffs. Optimizing in one area creates dysfunction in others. And optimizing to not make choices at all just creates another kind of dysfunction. Maturity is less about solving dysfunction than intentionally choosing which dysfunctions you can live with. Goes double for mature leadership. ** I'm Kieran Snyder, an AI exec, former CEO, and data storyteller who publishes new data and comics about AI, management, and work at nerd processor. Give me a follow if you like this stuff!", "hook": "This week's comic is inspired by something Daniel Chait tweeted many years ago, “Everyone else’s business looks easy from the outside.” It i…", "ratio": 0.96, "band": "baseline", "name": "Kieran Snyder"}, {"id": "7467242471790620672", "url": "https://www.linkedin.com/posts/kieran-snyder_something-that-surprises-many-of-my-male-activity-7467242471790620672-Oq-q", "kind": "post", "date": "2026-06-01T15:55:39.931000+00:00", "reactions": 139, "comments": 35, "engagement": 174, "text": "Something that surprises many of my male colleagues: Most women who achieve professional success in public get hate mail. Often it is anonymous, though not always. It isn't always explicitly threatening, though sometimes it is. It doesn't happen every day, but even a few times a year is enough to create baseline expectations that are dysfunctional. If a man gets famous enough, this happens to him too. But the fame bar for women to attract trolls is much lower. Among my network, for equivalent levels of public success, women get nastygrams significantly more often than men. I suspect that many men underestimate how often this happens and what the experience is like. Most women develop a thick skin about this, because what else can you do? But I wonder about the cumulative cost of containing this hostility over time. Like, what would it be like if you could just do the work without worrying about anonymous weirdos? This week, consider sending a woman whose work you admire some fan mail instead. ❤️", "hook": "Something that surprises many of my male colleagues: Most women who achieve professional success in public get hate mail.", "ratio": 3.41, "band": "working", "name": "Kieran Snyder"}, {"id": "7466172969166311424", "url": "https://www.linkedin.com/posts/kieran-snyder_end-of-week-reflection-its-been-just-over-activity-7466172969166311424-sRkh", "kind": "post", "date": "2026-05-29T17:05:50.635000+00:00", "reactions": 40, "comments": 2, "engagement": 42, "text": "End-of-week reflection: It's been just over 6 months since I returned to BigCo work. Here are three things about the change that have surprised me. 1) Muscle memory is deep. I was a strong enterprise operator before starting Textio and diving into startups for over a decade. Over the last few months, I have felt myself using skills that I forgot I had. Most surprisingly, my inside-enterprise operating skills have only improved thanks to my experience as a CEO. 2) Enterprise is operating with more urgency than in the past. My prior experience of enterprise, both as an employee and as a startup vendor who sold to them, was being frustrated by the slow pace. This time around, I am seeing some parts of enterprise outpace startups wrt execution. 3) Despite the above, tech companies are all kinda the same. Obviously cultures vary. But I've been surprised how similar the conversations are in big places and in small ones, especially when it comes to understanding the core levers of the business in the current market. Much of what I've experienced is what I expected, but the three things above have been real surprises. Naturally, startups and enterprises still operate differently. But breakout startups are growing faster than I've ever seen, and in many ways, enterprises are transforming operations to meet them from the other side. ** I'm Kieran Snyder, an AI exec, former CEO, and data storyteller who publishes new data and comics about AI, management, and work at nerd processor. Give me a follow if you like this stuff!", "hook": "End-of-week reflection: It's been just over 6 months since I returned to BigCo work.", "ratio": 0.82, "band": "baseline", "name": "Kieran Snyder"}, {"id": "7471580594255347712", "url": "https://www.linkedin.com/posts/kylelagunas_activity-7471580594255347712-TcAv", "kind": "post", "date": "2026-06-13T15:13:48.925000+00:00", "reactions": 0, "comments": 0, "engagement": 0, "text": "Sheila, Joshua, and Railey are among people you may know here", "hook": "Sheila, Joshua, and Railey are among people you may know here", "ratio": 0.0, "band": "baseline", "name": "Kyle Lagunas"}, {"id": "7471327706140446720", "url": "https://www.linkedin.com/posts/kylelagunas_activity-7471327706140446720-x5HP", "kind": "post", "date": "2026-06-12T22:28:55.700000+00:00", "reactions": 0, "comments": 0, "engagement": 0, "text": "Looking to create a page for a business? Get help", "hook": "Looking to create a page for a business?", "ratio": 0.0, "band": "baseline", "name": "Kyle Lagunas"}, {"id": "7471295426474803200", "url": "https://www.linkedin.com/posts/kylelagunas_activity-7471295426474803200-_34p", "kind": "post", "date": "2026-06-12T20:20:39.628000+00:00", "reactions": 0, "comments": 0, "engagement": 0, "text": "Looking to create a page for a business? Get help", "hook": "Looking to create a page for a business?", "ratio": 0.0, "band": "baseline", "name": "Kyle Lagunas"}, {"id": "7471236014599147520", "url": "https://www.linkedin.com/posts/kylelagunas_its-friyay-so-lets-have-some-fun-who-activity-7471236014599147520-bbBw", "kind": "post", "date": "2026-06-12T16:24:34.733000+00:00", "reactions": 67, "comments": 12, "engagement": 79, "text": "It's Friyay--so let's have some fun. Who is celebrating 🌈 Pride this year?? Last year, I put out a request for any branded Pride swag--preferably stickers, so I can deck out my laptop. Send whatever you have my way, and I'll give you a shoutout... and sport your brand at every event for the next year! 😇 Last year's allies: ClearCo Experian HiBob HiredScore Hireguide HR Bytes™ Community ZooKeep (Global)", "hook": "It's Friyay--so let's have some fun.", "ratio": 1.21, "band": "baseline", "name": "Kyle Lagunas"}, {"id": "7471203328366985216", "url": "https://www.linkedin.com/posts/kylelagunas_kudos-to-beth-whiteand-the-mebebot-team-activity-7471203328366985216-C00x", "kind": "post", "date": "2026-06-12T14:14:41.728000+00:00", "reactions": 10, "comments": 4, "engagement": 14, "text": "Today, MeBeBot is launching something we've been working on for a while and something we think the HR and IT community genuinely needs right now. Recognition! Introducing the Humanity in AI Awards. Too many AI deployments optimize for efficiency and forget the humans on the other end. These awards exist to change that narrative. We're recognizing 9 leaders and teams in HR, Operations, and IT who are getting AI right for people, not just getting AI deployed. There are three categories: 🏆 AI Literacy & Enablement For the leader or team that did the most to prepare their workforce for AI, through training, skill-building, change management, or communications that brought employees along rather than imposing AI on them. 🏆 Human-Centric AI Implementation For the leader or team that deployed AI in a way that measurably improved employees' daily work lives, reducing friction, speeding up answers, eliminating busywork, and creating more time for meaningful work. 🏆 AI Trust & Governance For the leader or team that built the most thoughtful framework for responsible AI use, acceptable use policies, data protection, transparency practices, audit mechanisms, or cross-functional governance structures. 3 category winners each receive a $500 gift card. 6 finalists receive dedicated blog and LinkedIn spotlights. All 9 honorees receive a custom digital badge and recognition at our virtual ceremony on August 6. Our judges are Felicia Newhouse, PhD of AI-Powered Women, George LaRocque of WORKTECH, and Zoë Walters of Empowrd AI bring decades of combined experience in HR technology, AI ethics, and organizational transformation. Nominations are open today. They close July 24. You can nominate yourself, someone else, or a team. Multiple nominations are welcome. If you know someone who is getting AI right for people, this is the moment to say so publicly. Nominate at https://lnkd.in/dP9dNuec 👇 #HumanityInAI #AIAwards #AIGovernance #AILiteracy #AIWorkforceTransformation", "hook": "Today, MeBeBot is launching something we've been working on for a while and something we think the HR and IT community genuinely needs right…", "ratio": 0.21, "band": "baseline", "name": "Kyle Lagunas"}, {"id": "7469741280168837121", "url": "https://www.linkedin.com/posts/kylelagunas_you-know-that-feeling-when-you-have-so-many-activity-7469741280168837121-3aIC", "kind": "post", "date": "2026-06-08T13:25:02.274000+00:00", "reactions": 102, "comments": 5, "engagement": 107, "text": "You know that feeling when you have so many thoughts on a topic, you can't quite say what you mean? Well I recently joined my ol' pal David Wachtel on Workday's Future of Work podcast to talk about... you guessed it—AI in HR. 😁 Several of the questions he asked had my mind working in overdrive, and there was one point I don't think I quite landed. It's arguably the most salient point from the entire convo, so I took some time to go deeper on it: HR isn't losing ground to AI. HR is ceding it. There's a difference between being a stakeholder in AI transformation and being a steward of it. And right now, most HR functions are firmly in the first camp—getting consulted, weighing in, occasionally pumping the brakes. But not leading. I wrote about why that distinction matters—and what it actually takes to close the gap. You can find it on the blog: https://lnkd.in/eag9PW9n And you can tune into the pod: https://lnkd.in/euQPWFNm", "hook": "You know that feeling when you have so many thoughts on a topic, you can't quite say what you mean?", "ratio": 1.63, "band": "baseline", "name": "Kyle Lagunas"}, {"id": "7467247000636256256", "url": "https://www.linkedin.com/posts/kylelagunas_i-was-in-the-room-at-cornerstone-ondemands-activity-7467247000636256256-Jhc1", "kind": "post", "date": "2026-06-01T16:13:39.692000+00:00", "reactions": 63, "comments": 16, "engagement": 79, "text": "I was in the room at Cornerstone OnDemand's analyst day and Connect roadshow for the launch of Cornerstone Workforce AI. Kyle & Co was invited to publish an honest, independent read on it. I'm working on my first-ever vlog for a review, but I needed to put my thoughts together first. A few takeaways worth sharing. Workforce AI is the most competitive answer Cornerstone has built in years. Against SAP SuccessFactors, Workday, Eightfold AI, and the broader talent intelligence category. If you're a Cornerstone customer, the platform you bought just got meaningfully more powerful. The real bet, though, is bigger than the launch made it sound. Talent intelligence vendors (e.g. Visier Inc., Lightcast, Revelio, Horsefly, TalentNeuron) built powerful platforms. But they're systems of insight sitting alongside the systems of action where work actually gets done. Insight that isn't actionable is a novelty—and that's leaving talent intelligence a little vulnerable when HR teams are under pressure to optimize their budgets. Cornerstone's move is different—with Workforce AI, they collapse that gap from the systems-of-action side. Put the intelligence layer and the action layer in the same box. That's the real thesis. Underneath all of this is something almost no one has covered: Cornerstone made a category-level pricing bet. Most AI HR vendors are pricing on consumption—per token, per API call, per agent action. Cornerstone walked away from that. Workforce AI is priced in outcome-tied bundles, no token charges, no API fees. That's the boldest commitment to value over consumption any major HR tech vendor has made this year. Which changes everything about what comes next. Because under consumption pricing, customer ignorance is revenue. Under outcome-based pricing, customer ignorance is churn. Cornerstone now has a direct commercial stake in helping customers actually operate what they bought. Full analysis here: https://lnkd.in/dbRNKbEi", "hook": "I was in the room at Cornerstone OnDemand's analyst day and Connect roadshow for the launch of Cornerstone Workforce AI.", "ratio": 1.21, "band": "baseline", "name": "Kyle Lagunas"}, {"id": "7465756177797296128", "url": "https://www.linkedin.com/posts/kylelagunas_the-human-centric-ai-council-was-built-on-activity-7465756177797296128-vTDg", "kind": "post", "date": "2026-05-28T13:29:39.829000+00:00", "reactions": 48, "comments": 4, "engagement": 52, "text": "The Human-Centric AI Council was built on two powerful ideas: 1. That the people side of AI transformation is the hard part. 2. That HR function needs to be ready to lead it. As you know, we pulled together a group of senior HR and talent leaders to address these ideas--and we have spent the last year building the toolkit to do exactly that. Today, we're sharing it publicly for the first time in our latest HCAIC Town Hall--delivered in partnership with Purple Acorn and with Brandice P. weaving their magic wand. Four resources + the practitioners who built them... And a real conversation about what responsible AI in HR actually looks like in practice rather than in theory. This one's open to everyone. Pull up a chair! Joining me will be several of lead contributors (and a couple of new faces!): Adam Treitler Alicia Miller Katie Burke Fairbank Rachel Bourne Tara Torres You can register to get the recording: https://lnkd.in/eae6P8VK Or you can dial in at 1:00p ET: https://lnkd.in/eyyDyfAQ", "hook": "The Human-Centric AI Council was built on two powerful ideas: 1.", "ratio": 0.79, "band": "baseline", "name": "Kyle Lagunas"}, {"id": "7463585776614879233", "url": "https://www.linkedin.com/posts/kylelagunas_decoded-by-findem-studio-kyle-lagunas-activity-7463585776614879233-5LJD", "kind": "post", "date": "2026-05-22T13:45:15.863000+00:00", "reactions": 50, "comments": 40, "engagement": 90, "text": "Not all MCP's are created equal. For starters: Some are able to produce way more insight than others (and in a super fun way). I tried Decoded by Findem Studio and the output shows me what data + context can produce. It's really cool. Out of over 200k HR Tech industry voices in Findem's public talent graph, only 3 matched my full signal stack—multi-firm operator track from IDC to Beamery to General Motors and back, principal-analyst voice with founder-level continuity, and Emerson College-trained storytelling. Even more interesting: the system matched my career DNA at 91% with none other than Josh Bersin and tagged my archetype as: \"The Analyst Who Crossed Every Side of the Table\" Pretty fascinating look at how AI interprets professional identity, influence, and career patterns--especially when it utilizes expertly labeled data. If you want to see your own profile breakdown, comment \"Findem Studio\" and I'll point you to it. #TalentIntelligence #HRTech #FutureOfWork #AI #IndependentAnalyst H/T to Joseph Cole, Liv Anderman and Frances Wei for this amazing idea!", "hook": "Not all MCP's are created equal.", "ratio": 1.37, "band": "baseline", "name": "Kyle Lagunas"}, {"id": "7461096542968549376", "url": "https://www.linkedin.com/posts/kylelagunas_hrtech-hrtransformation-activity-7461096542968549376-CU9c", "kind": "post", "date": "2026-05-15T16:53:56.314000+00:00", "reactions": 36, "comments": 1, "engagement": 37, "text": "Leadership has always been hard. I learned that lesson firsthand--and it nearly broke me. The good news is that there's a new generation of leaders in #hrtech and #hrtransformation who are strong enough to bear the uniquely heavy burden that the next chapter of AI in HR will bring. More than that, there are leaders driving innovation that's more than novel: it's useful. In my latest blog, I share a different kind of trend I think will shape what comes next: Not just what's built, but who's building it. TLDR (and it really *is* too long, sorry): The kids will be alright. Three vendors and leaders called out specifically (with two more write-ups on the content calendar): Hariharan Kolam and the Findem/Glider AI teams are raising the bar on AI-enabled talent operations with unique approaches to fraud, data, and assessment. Benjamin Encz and the Ashby team are reigniting the ATS market with products that illicited Oohs, Aahs, and applause at Open. Gerrit Kazmaier and the Workday team are redefining the requirements of HCM's core systems of record--and it's powered by a lot more than their acquisition of Sana. Check it out: https://lnkd.in/e64TDJFe", "hook": "Leadership has always been hard.", "ratio": 0.56, "band": "baseline", "name": "Kyle Lagunas"}, {"id": "7459939306380509185", "url": "https://www.linkedin.com/posts/kylelagunas_cornerstoneconnect26-activity-7459939306380509185-nXbO", "kind": "post", "date": "2026-05-12T12:15:29.611000+00:00", "reactions": 44, "comments": 8, "engagement": 52, "text": "Two years ago, every vendor was racing to ship GenAI use cases. *Some* of it was genuinely useful. A lot of it was feature theater. Buyers got skeptical fast—and rightfully so! Now the market is sorting itself out. The vendors that invested in the right foundations are pulling ahead. The ones that bolted AI onto legacy architecture, fragmented datasets, or isolated workflows are starting to show cracks in their value propositions. Cornerstone OnDemand is pushing hard to be recognized in that former camp. And I'll be honest: What little I know about what they're bringing to market right now can definitely keep them there through this next chapter of AI in HR. The Cornerstone team invited Kyle & Co to #CornerstoneConnect26 in New York next week to capture the moment firsthand—analyst preview on Tuesday, followed by announcement realness on Wednesday. Brandice and I will be talking to customers, leaders, and maybe an analyst or two on the ground about what the launch actually means for their work. Not the keynote version. The real version. I'll be sharing what I see, what I think, and (as always) what HR teams can really expect. Stay tuned. Cornerstone Connect is May 20 in New York. If you want to join, hit the link: https://lnkd.in/esFf8cZu", "hook": "Two years ago, every vendor was racing to ship GenAI use cases.", "ratio": 0.79, "band": "baseline", "name": "Kyle Lagunas"}, {"id": "7471210962247745536", "url": "https://www.linkedin.com/posts/larsschmidt_a-quick-public-message-to-address-some-of-activity-7471210962247745536-FLfb", "kind": "post", "date": "2026-06-12T14:45:01.787000+00:00", "reactions": 358, "comments": 33, "engagement": 391, "text": "A quick public message to address some of the inbound I'm getting from HR technology companies and vendors. I love that you're building an AI product. Truly. I wish you all the success in the world. I understand why you'd reach out to me with requests to demo or advise your company. I'm afraid I'll be declining all of these requests. There are two main reasons: 1️⃣ I have very limited bandwidth outside of my work at the moment. I'm choosing to spend that with my family. 2️⃣ I'm working on several builder initiatives across our talent team. That means it's possible I'll be working with teams building similar tools. Given that, I'm not comfortable meeting with external vendors that could overlap with this work. If you feel I'm ghosting you, this is why. I just wanted to be transparent and share why I won't be taking these calls. I'm still rooting for you. Good luck! ✌️", "hook": "A quick public message to address some of the inbound I'm getting from HR technology companies and vendors.", "ratio": null, "band": "n/a", "name": "Lars Schmidt"}, {"id": "7470906298159669248", "url": "https://www.linkedin.com/posts/larsschmidt_introducing-claude-corps-activity-7470906298159669248-zi3A", "kind": "post", "date": "2026-06-11T18:34:24.208000+00:00", "reactions": 39, "comments": 6, "engagement": 45, "text": "We’re launching Claude Corps, a fellowship program for people early in their careers who are passionate about extending the benefits of AI to communities across America. Alongside CodePath and Social Finance, we’ll teach 1,000 people how to use Claude, match them with mission-driven organizations across the US, and pay them to spend a year helping host organizations use AI to advance their missions. https://lnkd.in/eMnyFNz5", "hook": "We’re launching Claude Corps, a fellowship program for people early in their careers who are passionate about extending the benefits of AI t…", "ratio": null, "band": "n/a", "name": "Lars Schmidt"}, {"id": "7471583726167113728", "url": "https://www.linkedin.com/posts/lizryan_tough-to-argue-with-that-logic-activity-7471583726167113728-RlEI", "kind": "post", "date": "2026-06-13T15:26:15.631000+00:00", "reactions": 238, "comments": 40, "engagement": 278, "text": "", "hook": "", "ratio": 1.81, "band": "baseline", "name": "Liz Ryan"}, {"id": "7471305331516801024", "url": "https://www.linkedin.com/posts/lizryan_whats-the-best-concert-youve-ever-seen-activity-7471305331516801024-2dUS", "kind": "post", "date": "2026-06-12T21:00:01.174000+00:00", "reactions": 13, "comments": 74, "engagement": 87, "text": "What’s the best concert you’ve ever seen?", "hook": "What’s the best concert you’ve ever seen?", "ratio": 0.57, "band": "baseline", "name": "Liz Ryan"}, {"id": "7471209691285532672", "url": "https://www.linkedin.com/posts/lizryan_imagine-struggling-to-put-food-on-the-table-activity-7471209691285532672-9kQw", "kind": "post", "date": "2026-06-12T14:39:58.766000+00:00", "reactions": 162, "comments": 20, "engagement": 182, "text": "Imagine struggling to put food on the table and also knowing that people who don’t know you, know nothing about you, are trying to ration what you’re able to eat and drink, item by item", "hook": "Imagine struggling to put food on the table and also knowing that people who don’t know you, know nothing about you, are trying to ration wh…", "ratio": 1.19, "band": "baseline", "name": "Liz Ryan"}, {"id": "7470985152442167296", "url": "https://www.linkedin.com/posts/lizryan_way-beyond-embarrassing-its-abusive-activity-7470985152442167296-JNke", "kind": "post", "date": "2026-06-11T23:47:44.534000+00:00", "reactions": 91, "comments": 85, "engagement": 176, "text": "Let's look at this (objectively unhinged) email that MrBeast employees got the other day, **from an internal comms lens.** AS AN INTERNAL COMMS MESSAGE, it is, unfortunately, good: + It is very clear! + It avoids jargon. It's written conversationally (and, most likely, by a human. Key for trust) + It shows employees one way to see themselves in the business and its success + It answers the crucial question \"what's in it for me\" + It's equitable (\"no one is exempt from this\") Obviously, however, its content is wildly inappropriate. + And possibly illegal? + Just to spell it out: Monitoring what the CEO eats is not, in fact, everyone's job. Bringing food to the CEO is not, in fact, every
